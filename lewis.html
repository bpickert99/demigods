<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lewis — Demigods Campaign · v3.1
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Cinzel+Decorative:wght@700&family=Inter:wght@400;500;600&family=Crimson+Pro:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --bg:#0a0a0f;--surf:#111118;--surf2:#1a1a26;--border:#2a2a40;--border2:#3a3a58;
  --text:#e8e0d0;--muted:#9090b0;--dim:#606080;
  --gold:#d4a84b;--gold2:#d4a84b30;
  --lewis:#7c3aed;--lewis-acc:#ddd6fe;--lewis-glow:#7c3aed44;
  --prophecy:#7c3aed;--prophecy-acc:#ddd6fe;--prophecy-glow:#7c3aed55;--prophecy-bg:#2d1b6918;
  --war:#b91c1c;--war-acc:#fecaca;--war-glow:#ef444455;--war-bg:#7f1d1d18;
  --sovereignty:#047857;--sovereignty-acc:#a7f3d0;--sovereignty-glow:#10b98155;--sovereignty-bg:#06402418;
  --success:#22c55e;--partial:#f59e0b;--fail:#ef4444;
  --rc:#fbbf24;--fc:#e879f9;--gc:#34d399;
  --harm:#ef4444;--unstable:#f97316;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;font-size:15px;line-height:1.6;min-height:100vh;overflow-x:hidden}
#bg-canvas{position:fixed;inset:0;pointer-events:none;z-index:0;opacity:.4}
.wrap{position:relative;z-index:2;max-width:1000px;margin:0 auto;padding:0 16px 80px}

/* ── HEADER ── */
.char-header{display:flex;align-items:center;gap:20px;padding:24px 0 20px;border-bottom:1px solid var(--border)}
.char-avatar{width:64px;height:64px;border-radius:50%;border:2px solid var(--lewis);background:var(--surf2);display:flex;align-items:center;justify-content:center;font-size:28px;box-shadow:0 0 20px var(--lewis-glow);flex-shrink:0}
.char-info h1{font-family:'Cinzel Decorative',serif;font-size:22px;color:var(--text);letter-spacing:1px}
.char-info .char-sub{font-size:12px;letter-spacing:4px;color:var(--lewis-acc);font-family:'Cinzel',serif;font-weight:700;text-transform:uppercase;margin-top:2px}
.char-vitals{margin-left:auto;text-align:right;display:flex;flex-direction:column;gap:4px}
.mortality-display{font-family:'Cinzel',serif;font-size:11px;font-weight:700;letter-spacing:3px;color:var(--muted);text-transform:uppercase}
.mortality-num{font-family:'Cinzel Decorative',serif;font-size:24px;color:var(--harm);display:inline}
.harm-num{font-family:'Cinzel Decorative',serif;font-size:24px;color:var(--text);display:inline}
.sync-dot{width:8px;height:8px;border-radius:50%;background:#22c55e;display:inline-block;margin-left:8px;box-shadow:0 0 6px #22c55e}
.sync-dot.off{background:#ef4444;box-shadow:0 0 6px #ef4444}

/* ── PLAYBOOK TOGGLE ── */
.pb-toggle{display:flex;gap:0;border:1px solid var(--border);border-radius:6px;overflow:hidden;margin:20px 0}
.pb-btn{flex:1;padding:12px 8px;border:none;background:var(--surf);cursor:pointer;font-family:'Cinzel',serif;font-size:11px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--dim);transition:all .25s;border-right:1px solid var(--border)}
.pb-btn:last-child{border-right:none}
.pb-btn.active{background:var(--surf2);color:var(--lewis-acc);box-shadow:inset 0 -2px 0 var(--lewis)}

/* ── PLAYBOOK PANELS ── */
.pb-panel{display:none}.pb-panel.active{display:block}

/* ── COMBAT OVERLAY ── */
.combat-overlay{display:none;position:fixed;inset:0;z-index:150;background:#050508;flex-direction:column;overflow-y:auto}
.combat-overlay.vis{display:flex}
.co-header{display:flex;align-items:center;gap:14px;padding:16px 20px;background:linear-gradient(135deg,#1a0800,#080400);border-bottom:2px solid var(--gold)}
.co-title{font-family:'Cinzel Decorative',serif;font-size:18px;color:var(--gold);letter-spacing:2px}
.co-round{font-family:'Cinzel',serif;font-size:11px;font-weight:700;letter-spacing:3px;color:var(--muted);text-transform:uppercase;margin-left:auto}
.co-body{display:grid;grid-template-columns:1fr 1fr;gap:20px;padding:20px;flex:1}
@media(max-width:600px){.co-body{grid-template-columns:1fr}}
.co-section{background:#0e0e1c;border:1px solid var(--border);border-radius:8px;padding:14px}
.co-sec-title{font-family:'Cinzel',serif;font-size:10px;font-weight:700;letter-spacing:4px;text-transform:uppercase;color:var(--dim);margin-bottom:10px;display:flex;align-items:center;gap:8px}
.co-sec-title::after{content:'';flex:1;height:1px;background:var(--border)}
.co-harm-bar{height:8px;background:var(--border2);border-radius:4px;overflow:hidden;margin:8px 0}
.co-harm-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,#22c55e,#f59e0b,#ef4444);transition:width .4s}
.co-stat-nums{font-family:'Cinzel Decorative',serif;font-size:20px;color:var(--harm)}
.co-actions{display:flex;gap:8px;flex-wrap:wrap}
.co-apip{width:36px;height:36px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;border:2px solid var(--border2);background:var(--surf2);transition:all .2s}
.co-apip.avail{background:#22c55e20;border-color:var(--success);color:var(--success)}
.co-apip.used{background:var(--border);border-color:var(--dim);color:var(--dim)}
.co-tracks{display:flex;gap:10px}
.co-track{flex:1;text-align:center}
.co-track-lbl{font-family:'Cinzel',serif;font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;display:block;margin-bottom:5px}
.co-pips{display:flex;gap:4px;justify-content:center}
.co-pip{width:18px;height:18px;border-radius:50%;border:2px solid var(--border2);background:var(--surf2)}
.co-pip.on.wisdom{background:#60a5fa;border-color:#93c5fd;box-shadow:0 0 6px #60a5fa66}
.co-pip.on.grit{background:#f87171;border-color:#fca5a5;box-shadow:0 0 6px #f8717166}
.co-pip.on.bond{background:#4ade80;border-color:#86efac;box-shadow:0 0 6px #4ade8066}
.co-queue-list{display:flex;flex-direction:column;gap:6px}
.co-queue-item{display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--surf2);border:1px solid var(--border);border-radius:4px;font-size:13px}
.co-queue-item.my-turn{border-color:var(--gold);background:var(--gold2)}
.co-queue-item.active{border-color:var(--success)}
.co-join-btn{width:100%;padding:12px;border-radius:6px;border:1px solid var(--gold);background:transparent;color:var(--gold);font-family:'Cinzel',serif;font-size:12px;font-weight:700;letter-spacing:3px;text-transform:uppercase;cursor:pointer;transition:all .2s;margin-top:10px}
.co-join-btn:hover{background:var(--gold2)}
.co-join-btn:disabled{opacity:.35;cursor:default;pointer-events:none}
.co-actions-panel{background:#0a0a1a;border:2px solid var(--gold);border-radius:8px;padding:16px;margin-top:12px;animation:fadeUp .25s ease}
.co-actions-panel h3{font-family:'Cinzel Decorative',serif;font-size:15px;color:var(--gold);margin-bottom:12px;text-align:center}
.co-action-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
.co-action-btn{padding:10px 12px;border-radius:6px;border:1px solid var(--border2);background:var(--surf2);color:var(--text);font-family:'Cinzel',serif;font-size:11px;font-weight:700;letter-spacing:1px;cursor:pointer;transition:all .2s;text-align:left}
.co-action-btn:hover{border-color:var(--gold);background:var(--gold2)}
.co-action-btn .co-action-icon{font-size:18px;display:block;margin-bottom:3px}
.co-action-btn .co-action-cost{font-size:9px;color:var(--dim);letter-spacing:1px;margin-top:2px}
.co-weapon-display{padding:8px 12px;background:var(--surf2);border:1px solid var(--border);border-radius:4px;font-size:13px;color:var(--text);margin-bottom:8px}
.co-weapon-name{font-weight:600}
.co-weapon-harm{font-family:'Cinzel',serif;font-size:11px;font-weight:700;color:var(--rc);margin-left:8px}
.co-inv-item{display:flex;align-items:center;gap:8px;padding:6px 10px;background:var(--surf2);border:1px solid var(--border);border-radius:4px;margin-bottom:5px;font-size:12px}
.co-inv-use{padding:3px 8px;border-radius:4px;border:1px solid var(--gold)60;background:transparent;color:var(--gold);font-size:10px;font-weight:700;cursor:pointer;transition:all .18s}
.co-inv-use:hover{background:var(--gold2)}
/* Bond button */
.bond-btn{padding:6px 14px;border-radius:4px;border:1px solid #4ade8060;background:transparent;color:#4ade80;font-family:'Cinzel',serif;font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:all .18s}
.bond-btn:hover{background:#4ade8015}
.bond-btn:disabled{opacity:.35;cursor:default}
/* Wisdom prompt */
.wisdom-prompt{padding:10px 14px;background:var(--surf2);border:1px solid #60a5fa40;border-radius:6px;margin-bottom:10px;text-align:center}
.wisdom-prompt p{font-size:13px;color:var(--muted);margin-bottom:8px}
.wisdom-btns{display:flex;gap:8px;justify-content:center}
.wisdom-yes{padding:7px 18px;border-radius:4px;border:1px solid #60a5fa;background:transparent;color:#60a5fa;font-family:'Cinzel',serif;font-size:10px;font-weight:700;letter-spacing:2px;cursor:pointer;transition:all .18s}
.wisdom-yes:hover{background:#60a5fa20}
.wisdom-no{padding:7px 18px;border-radius:4px;border:1px solid var(--border2);background:transparent;color:var(--muted);font-family:'Cinzel',serif;font-size:10px;font-weight:700;letter-spacing:2px;cursor:pointer;transition:all .18s}
.wisdom-no:hover{border-color:var(--text);color:var(--text)}
/* Undo notification */
.undo-notif{display:none;padding:12px 16px;background:linear-gradient(135deg,#1a0000,#0a0000);border:1px solid var(--fail);border-radius:6px;margin-bottom:12px;text-align:center;animation:fadeUp .2s ease}
.undo-notif.vis{display:block}
.undo-notif p{font-family:'Cinzel',serif;font-size:11px;font-weight:700;letter-spacing:2px;color:var(--fail);text-transform:uppercase}

/* ── PARCHMENT (Hero tab) ── */
#pb-hero{
  background:linear-gradient(160deg,#f5ecd7,#ede0c4);
  border:1px solid #c4a87a;border-radius:0 0 6px 6px;
  padding:20px 16px;
  /* aged paper texture */
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.65' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.06'/%3E%3C/svg%3E"),
    linear-gradient(160deg,#f5ecd7,#ede0c4);
  background-size:300px 300px, cover;
  color:#2c1a08;
}
#pb-hero .section-title{color:#7a5c2e;border-color:transparent}
#pb-hero .section-title::after{background:#c4a87a}
#pb-hero .skill-row{background:#fdf6e8;border-color:#c4a87a;color:#2c1a08}
#pb-hero .skill-row:hover{background:#fff8f0;border-color:#8b6340}
#pb-hero .skill-name{color:#2c1a08}
#pb-hero .skill-dice{color:#7a3c10}
#pb-hero .sbox{border-color:#c4a87a;background:#ede0c4}
#pb-hero .sbox.checked{background:#8b4513;border-color:#a0522d;box-shadow:0 0 4px #8b451366}
#pb-hero .skill-roll-btn{border-color:#c4a87a;color:#7a5c2e}
#pb-hero .skill-roll-btn:hover{background:#8b451320;border-color:#8b4513;color:#8b4513}
#pb-hero .stat-track{background:#fdf6e8;border-color:#c4a87a}
#pb-hero .stat-pip{border-color:#c4a87a;background:#ede0c4}
#pb-hero .stat-pip.on.wisdom{background:#60a5fa;border-color:#93c5fd;box-shadow:0 0 6px #60a5fa88}
#pb-hero .stat-pip.on.grit{background:#f87171;border-color:#fca5a5;box-shadow:0 0 6px #f8717188}
#pb-hero .stat-pip.on.bond{background:#4ade80;border-color:#86efac;box-shadow:0 0 6px #4ade8088}
#pb-hero .harm-section{background:#fdf6e8;border-color:#c4a87a}
#pb-hero .harm-bar-bg{background:#d4b896}
#pb-hero .harm-nums{color:#7a5c2e}
#pb-hero .harm-nums span{color:#8b2500}
#pb-hero .condition-row{background:#f5ecd7;border-color:#c4a87a;color:#2c1a08}
#pb-hero .cond-label{color:#2c1a08}
#pb-hero .cond-harm{color:#8b2500}
#pb-hero .add-cond-input{background:#fdf6e8;border-color:#c4a87a;color:#2c1a08}
#pb-hero .add-cond-input:focus{border-color:#8b4513}
#pb-hero .add-cond-btn{border-color:#8b4513;color:#8b4513}
#pb-hero .add-cond-btn:hover{background:#8b451320}
#pb-hero .harm-btn{background:#f5ecd7;border-color:#c4a87a;color:#2c1a08}
#pb-hero .harm-btn:hover{border-color:#8b2500;color:#8b2500}
#pb-hero .inventory-list .item-card{background:#fdf6e8;border-color:#c4a87a;color:#2c1a08}
#pb-hero .item-name{color:#2c1a08}
#pb-hero .itag{background:#ede0c4;border-color:#c4a87a;color:#5c3d1e}
#pb-hero .itag.harm{color:#8b2500;border-color:#8b250040;background:#8b250010}
#pb-hero .dur-pip{border-color:#c4a87a;background:#ede0c4}
#pb-hero .dur-pip.on{background:#5c8a3c;border-color:#4a7a2a}
#pb-hero .action-item{background:#fdf6e8;border-color:#c4a87a;color:#5c3d1e}
#pb-hero .action-item strong{color:#2c1a08}
#pb-hero .action-col h4{color:#7a5c2e}
#pb-hero .section-title[style]{color:#7a5c2e!important}
/* Parchment pending banner */
#pb-hero ~ .pending-banner,
.pending-banner{background:linear-gradient(135deg,#2a2000,#1a1400)}

/* Knotwork divider for section titles in hero tab */
#pb-hero .section-title{font-family:'Cinzel',serif;font-size:10px;font-weight:700;letter-spacing:5px}
#pb-hero .section-title::before{content:'᚛ ';color:#8b6340;font-size:13px}
#pb-hero .section-title::after{background:linear-gradient(90deg,#c4a87a,transparent)}

/* ── SECTION HEADERS ── */
.section{margin-bottom:24px}
.section-title{font-family:'Cinzel',serif;font-size:10px;font-weight:700;letter-spacing:5px;text-transform:uppercase;color:var(--dim);margin-bottom:12px;display:flex;align-items:center;gap:10px}
.section-title::after{content:'';flex:1;height:1px;background:var(--border)}

/* ── SKILLS GRID ── */
.skills-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
@media(min-width:600px){.skills-grid{grid-template-columns:repeat(3,1fr)}}
.skill-row{display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--surf);border:1px solid var(--border);border-radius:6px;cursor:pointer;transition:all .2s;user-select:none}
.skill-row:hover{border-color:var(--border2);background:var(--surf2)}
.skill-name{font-size:13px;font-weight:600;color:var(--text);min-width:72px}
.skill-boxes{display:flex;gap:4px;flex:1}
.sbox{width:16px;height:16px;border-radius:3px;border:1px solid var(--border2);background:var(--surf2);cursor:pointer;transition:all .18s;flex-shrink:0}
.sbox.checked{background:var(--lewis);border-color:var(--lewis-acc);box-shadow:0 0 5px var(--lewis-glow)}
.skill-dice{font-family:'Cinzel',serif;font-size:11px;font-weight:700;color:var(--lewis-acc);min-width:24px;text-align:right}
.skill-roll-btn{width:22px;height:22px;border-radius:4px;border:1px solid var(--border2);background:transparent;color:var(--muted);cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;transition:all .18s;flex-shrink:0}
.skill-roll-btn:hover{background:var(--lewis-glow);border-color:var(--lewis);color:var(--lewis-acc)}

/* ── STAT TRACKS ── */
.stat-tracks{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:8px}
.stat-track{background:var(--surf);border:1px solid var(--border);border-radius:6px;padding:12px 14px}
.stat-label{font-family:'Cinzel',serif;font-size:10px;font-weight:700;letter-spacing:3px;text-transform:uppercase;margin-bottom:8px}
.stat-label.wisdom{color:#60a5fa}
.stat-label.grit{color:#f87171}
.stat-label.bond{color:#4ade80}
.stat-desc{font-size:11px;color:var(--dim);margin-bottom:8px;line-height:1.4}
.stat-pips{display:flex;gap:5px}
.stat-pip{width:20px;height:20px;border-radius:50%;border:1px solid var(--border2);background:var(--surf2);transition:all .18s}
.stat-pip.on.wisdom{background:#60a5fa;border-color:#93c5fd;box-shadow:0 0 6px #60a5fa88}
.stat-pip.on.grit{background:#f87171;border-color:#fca5a5;box-shadow:0 0 6px #f8717188}
.stat-pip.on.bond{background:#4ade80;border-color:#86efac;box-shadow:0 0 6px #4ade8088}
.stat-pip:hover{transform:scale(1.2)}

/* ── MORTALITY / HARM ── */
.harm-section{background:var(--surf);border:1px solid var(--border);border-radius:6px;padding:16px}
.harm-bar-wrap{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.harm-bar-bg{flex:1;height:10px;background:var(--surf2);border-radius:5px;overflow:hidden}
.harm-bar-fill{height:100%;border-radius:5px;background:linear-gradient(90deg,#22c55e,#f59e0b,#ef4444);transition:width .5s ease}
.harm-nums{font-family:'Cinzel',serif;font-size:13px;font-weight:700;color:var(--muted);white-space:nowrap}
.harm-nums span{color:var(--harm)}
.conditions-list{display:flex;flex-direction:column;gap:8px}
.condition-row{display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--surf2);border:1px solid var(--border);border-radius:6px;animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
.cond-label{flex:1;font-size:14px;color:var(--text)}
.cond-harm{font-family:'Cinzel',serif;font-size:13px;font-weight:700;color:var(--harm);min-width:28px;text-align:center}
.cond-unstable{font-size:10px;font-weight:700;letter-spacing:1px;padding:2px 7px;border-radius:10px;border:1px solid var(--unstable);color:var(--unstable);background:#f9731610;cursor:pointer;white-space:nowrap}
.cond-unstable.stable{border-color:var(--border2);color:var(--dim);background:transparent}
.cond-del{width:24px;height:24px;border-radius:4px;border:none;background:transparent;color:var(--dim);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:color .18s}
.cond-del:hover{color:var(--fail)}
.harm-adjust{display:flex;gap:6px;align-items:center}
.harm-btn{padding:5px 14px;border-radius:4px;border:1px solid var(--border2);background:var(--surf2);color:var(--text);font-family:'Cinzel',serif;font-size:11px;font-weight:700;letter-spacing:1px;cursor:pointer;transition:all .18s}
.harm-btn:hover{border-color:var(--harm);color:var(--harm)}
.harm-input{width:44px;padding:5px 8px;border-radius:4px;border:1px solid var(--border2);background:var(--surf2);color:var(--text);font-size:14px;text-align:center}
.harm-input:focus{outline:none;border-color:var(--lewis)}
.add-cond-form{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
.add-cond-input{flex:1;min-width:120px;padding:7px 12px;border-radius:4px;border:1px solid var(--border2);background:var(--surf2);color:var(--text);font-size:14px}
.add-cond-input:focus{outline:none;border-color:var(--lewis)}
.add-cond-btn{padding:7px 14px;border-radius:4px;border:1px solid var(--lewis);background:transparent;color:var(--lewis-acc);font-family:'Cinzel',serif;font-size:11px;font-weight:700;letter-spacing:1px;cursor:pointer;transition:all .18s;white-space:nowrap}
.add-cond-btn:hover{background:var(--lewis-glow)}

/* ── FAVOR ── */
.favor-section{background:var(--surf);border:1px solid var(--fc)30;border-radius:6px;padding:14px 16px;margin-bottom:24px}
.favor-top{display:flex;align-items:center;gap:12px;margin-bottom:10px;flex-wrap:wrap}
.favor-lbl{font-family:'Cinzel',serif;font-size:11px;font-weight:700;letter-spacing:4px;color:var(--fc);text-transform:uppercase}
.favor-num-big{font-family:'Cinzel Decorative',serif;font-size:22px;color:var(--fc)}
.favor-slash{font-size:12px;color:var(--dim);font-family:'Cinzel',serif}
.favor-btns{display:flex;gap:6px;margin-left:auto}
.favor-btn{width:28px;height:28px;border-radius:50%;border:1px solid var(--fc)60;background:transparent;color:var(--fc);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:all .18s}
.favor-btn:hover{background:var(--fc)20;border-color:var(--fc)}
.refill-btn{padding:6px 14px;border-radius:4px;border:1px solid var(--fc)60;background:transparent;color:var(--fc);font-family:'Cinzel',serif;font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:all .2s;white-space:nowrap}
.refill-btn:hover{background:var(--fc)20;border-color:var(--fc)}
.favor-tokens{display:flex;flex-wrap:wrap;gap:4px}
.ftok{width:18px;height:18px;border-radius:50%;border:1px solid var(--fc)40;background:var(--surf2);cursor:pointer;transition:all .18s;flex-shrink:0}
.ftok.on{background:var(--fc)20;border-color:var(--fc);box-shadow:0 0 6px var(--fc)77}
.ftok:hover{transform:scale(1.3)}

/* ── INVENTORY ── */
.inventory-list{display:flex;flex-direction:column;gap:8px}
.item-card{background:var(--surf);border:1px solid var(--border);border-radius:6px;padding:12px 14px}
.item-top{display:flex;align-items:flex-start;gap:10px}
.item-name{font-weight:600;font-size:14px;color:var(--text);flex:1}
.item-tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:5px}
.itag{font-size:10px;font-weight:600;letter-spacing:1px;padding:2px 7px;border-radius:10px;background:var(--surf2);border:1px solid var(--border2);color:var(--muted)}
.itag.harm{color:var(--harm);border-color:var(--harm)40;background:var(--harm)10}
.itag.blessed{color:#fcd34d;border-color:#fcd34d40;background:#fcd34d10}
.armor-dur{display:flex;align-items:center;gap:6px;margin-top:6px}
.armor-dur-label{font-size:11px;color:var(--dim);font-family:'Cinzel',serif;font-weight:700;letter-spacing:1px}
.dur-pips{display:flex;gap:3px}
.dur-pip{width:14px;height:14px;border-radius:3px;border:1px solid var(--border2);background:var(--surf2);cursor:pointer;transition:all .18s}
.dur-pip.on{background:#60a5fa;border-color:#93c5fd}
.dur-pip.off{background:var(--surf2);border-color:var(--border)}
.item-del{width:22px;height:22px;border-radius:4px;border:none;background:transparent;color:var(--dim);cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;transition:color .18s;flex-shrink:0}
.item-del:hover{color:var(--fail)}
.item-send-btn{font-size:10px;font-weight:600;letter-spacing:1px;padding:3px 8px;border-radius:4px;border:1px solid var(--border2);background:transparent;color:var(--muted);cursor:pointer;transition:all .18s;margin-top:4px}
.item-send-btn:hover{border-color:var(--lewis);color:var(--lewis-acc)}

/* ── DIVINE PLAYBOOK (Morrigan) ── */
.dp-detail{display:none;padding:22px 26px;border:1px solid var(--border);border-radius:8px;background:linear-gradient(135deg,var(--dpbg,#13132a),var(--bg));box-shadow:0 0 50px var(--dpglow,transparent);margin-bottom:24px;animation:fadeUp .22s ease}
.dp-detail.vis{display:block}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.dp-meta{font-family:'Cinzel',serif;font-size:11px;font-weight:700;letter-spacing:4px;color:var(--dpacc);text-transform:uppercase;margin-bottom:4px}
.dp-name{font-family:'Cinzel Decorative',serif;font-size:clamp(16px,2.5vw,22px);color:var(--text);letter-spacing:1px;margin-bottom:8px}
.dp-rule{height:1px;background:var(--border);margin:12px 0}
.move-block{background:#06060f;border:1px solid var(--border);border-radius:6px;padding:16px 20px;margin-bottom:10px}
.move-trigger{font-family:'Cinzel',serif;font-size:11px;font-weight:700;letter-spacing:2px;color:var(--dpacc);margin-bottom:8px;text-transform:uppercase}
.move-roll-line{font-size:15px;color:var(--muted);margin-bottom:12px;font-style:italic}
.move-roll-line strong{color:var(--rc);font-style:normal;font-family:'Cinzel',serif;font-size:12px;font-weight:700;letter-spacing:1px}
.move-outcomes{display:flex;flex-direction:column;gap:8px}
.outcome{display:flex;gap:10px;align-items:flex-start;padding:8px 0;border-bottom:1px solid #ffffff08}
.outcome:last-child{border-bottom:none}
.opic{flex-shrink:0;margin-top:5px;width:9px;height:9px;border-radius:50%;background:var(--border)}
.outcome.success .opic{background:#22c55e;box-shadow:0 0 7px #22c55e99}
.outcome.partial .opic{background:var(--rc);box-shadow:0 0 7px #fbbf2499}
.outcome.fail .opic{background:#f87171;box-shadow:0 0 7px #f8717199}
.olabel{font-family:'Cinzel',serif;font-size:10px;font-weight:700;letter-spacing:2px;color:var(--muted);text-transform:uppercase;display:block;margin-bottom:3px}
.otext{font-size:14px;color:var(--text);line-height:1.75}
.otext ul{padding-left:18px;margin-top:5px}
.otext li{margin-bottom:4px;font-size:13px;color:var(--muted)}
.passive-block{font-size:14px;line-height:1.85;color:var(--text)}
.passive-block strong{color:#f5f0e8;font-weight:600}
.passive-block ul{padding-left:18px;margin-top:5px}
.passive-block li{margin-bottom:4px;font-size:13px;color:var(--muted)}
.q-list{margin-top:12px;padding-top:10px;border-top:1px solid var(--border)}
.q-list-lbl{font-family:'Cinzel',serif;font-size:10px;font-weight:700;letter-spacing:3px;color:var(--muted);margin-bottom:6px;text-transform:uppercase}
.q-list ul{padding-left:18px}
.q-list li{font-size:13px;color:var(--muted);margin-bottom:5px;line-height:1.6}
.dp-prereq{margin-top:10px;font-family:'Cinzel',serif;font-size:10px;font-weight:700;letter-spacing:3px;color:var(--dim);text-transform:uppercase}
.use-btn{display:inline-flex;align-items:center;gap:6px;margin-top:14px;padding:9px 20px;border-radius:4px;border:1px solid var(--dpacc);background:linear-gradient(135deg,var(--dpbg,#13132a),#06060f);color:var(--dpacc);font-family:'Cinzel',serif;font-size:11px;font-weight:700;letter-spacing:3px;text-transform:uppercase;cursor:pointer;transition:all .2s}
.use-btn:hover{background:var(--dpacc);color:#000;box-shadow:0 0 16px var(--dpglow)}
.use-btn .ub-cost{background:#00000040;border-radius:20px;padding:1px 8px;font-family:'Cinzel Decorative',serif;font-size:12px;color:var(--fc)}
.use-btn:hover .ub-cost{color:#000}
.use-btn-used{opacity:.45;cursor:default;pointer-events:none}

/* ── MORRIGAN TABS ── */
.tabs{display:grid;grid-template-columns:repeat(3,1fr);border:1px solid var(--border);border-radius:4px 4px 0 0;overflow:hidden}
.tab-btn{padding:14px 8px;border:none;background:var(--surf);cursor:pointer;font-family:'Cinzel',serif;font-size:11px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--dim);transition:all .28s;border-right:1px solid var(--border);position:relative}
.tab-btn:last-child{border-right:none}
.tglyph{display:block;font-size:18px;margin-bottom:3px;transition:all .28s}
.tab-btn::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;transform:scaleX(0);transition:transform .28s}
.tab-btn[data-b="prophecy"]::after{background:var(--prophecy-acc)}
.tab-btn[data-b="war"]::after{background:var(--war-acc)}
.tab-btn[data-b="sovereignty"]::after{background:var(--sovereignty-acc)}
.tab-btn.active::after,.tab-btn:hover::after{transform:scaleX(1)}
.tab-btn[data-b="prophecy"].active,.tab-btn[data-b="prophecy"]:hover{color:var(--prophecy-acc);background:var(--surf2)}
.tab-btn[data-b="war"].active,.tab-btn[data-b="war"]:hover{color:var(--war-acc);background:var(--surf2)}
.tab-btn[data-b="sovereignty"].active,.tab-btn[data-b="sovereignty"]:hover{color:var(--sovereignty-acc);background:var(--surf2)}
.tab-btn.active .tglyph{filter:drop-shadow(0 0 5px currentColor)}
.bpanel{display:none;padding:24px;background:var(--surf);border:1px solid var(--border);border-top:none;border-radius:0 0 4px 4px}
.bpanel.active{display:block}
.bhead{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:20px;padding-bottom:12px;border-bottom:1px solid var(--border)}
.btitle{font-family:'Cinzel Decorative',serif;font-size:clamp(15px,2.5vw,22px);letter-spacing:2px}
.bsub{font-size:13px;font-style:italic;margin-top:3px;color:var(--muted);font-family:'Crimson Pro',serif}
.bprog{font-family:'Cinzel',serif;font-size:11px;font-weight:700;letter-spacing:2px;color:var(--muted);text-align:right}
.bprog .cnt{font-size:20px;display:block;margin-bottom:2px;font-family:'Cinzel Decorative',serif}
.tier{margin-bottom:24px}
.tier-head{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.tier-head span{font-family:'Cinzel',serif;font-size:10px;font-weight:700;letter-spacing:4px;color:var(--dim);white-space:nowrap;text-transform:uppercase}
.tier-rule{flex:1;height:1px;background:var(--border)}
.tgrid{display:grid;gap:10px}
.c1{grid-template-columns:1fr}.c2{grid-template-columns:repeat(2,1fr)}.c3{grid-template-columns:repeat(3,1fr)}
@media(max-width:580px){.c3,.c2{grid-template-columns:1fr}}
.node{padding:13px 15px;border-radius:6px;border:1px solid var(--border);background:#06060f;cursor:pointer;transition:all .2s;position:relative;user-select:none;min-height:100px;display:flex;flex-direction:column}
.node.avail:hover{border-color:var(--nc);background:#0a0a18;transform:translateY(-2px);box-shadow:0 5px 18px var(--ng)}
.node.unlocked{border-color:var(--nc);background:linear-gradient(135deg,var(--nb),#06060f);box-shadow:0 0 14px var(--ng)}
.node.locked{opacity:.3;cursor:default}
.node.selected{outline:2px solid var(--na);outline-offset:2px}
.nbadges{display:flex;gap:4px;margin-bottom:7px;flex-wrap:wrap;align-items:center;min-height:20px}
.badge{font-family:'Cinzel',serif;font-size:8px;font-weight:700;letter-spacing:1.5px;padding:2px 7px;border-radius:20px;text-transform:uppercase;white-space:nowrap}
.b-roll{color:var(--rc);background:#fbbf2412;border:1px solid #fbbf2440}
.b-pass{color:#93c5fd;background:#3b82f614;border:1px solid #3b82f630}
.b-fav{color:var(--fc);background:#e879f910;border:1px solid #e879f940}
.b-cross{color:#fb923c;background:#ea580c12;border:1px solid #ea580c40}
.npip{width:7px;height:7px;border-radius:50%;background:var(--border);margin-bottom:7px;transition:all .28s;flex-shrink:0}
.node.unlocked .npip{background:var(--na);box-shadow:0 0 7px var(--na)}
.node.avail:not(.unlocked) .npip{background:#252545}
.nname{font-family:'Cinzel',serif;font-size:13px;font-weight:700;letter-spacing:.5px;color:#d0d0f0;margin-bottom:4px;transition:color .2s;line-height:1.3}
.node.unlocked .nname{color:#f0ead8}
.ndice{display:flex;align-items:center;gap:7px;margin-bottom:4px}
.dval{font-family:'Cinzel Decorative',serif;font-size:15px;color:var(--na)}
.lvl-btns{display:flex;gap:4px}
.lvl-btn{font-family:'Cinzel',serif;font-size:8px;font-weight:700;letter-spacing:1px;padding:2px 7px;border-radius:20px;border:1px solid var(--na);background:transparent;color:var(--na);cursor:pointer;transition:all .18s}
.lvl-btn:hover{background:var(--na);color:#000}
.nmaxbadge{font-family:'Cinzel',serif;font-size:8px;font-weight:700;letter-spacing:2px;color:var(--rc)}
.ndesc{font-size:12px;line-height:1.55;color:var(--dim);flex:1}
.node.unlocked .ndesc{color:#b0a890}
.npre{margin-top:7px;font-family:'Cinzel',serif;font-size:9px;font-weight:700;letter-spacing:1.5px;color:#5050a0}
.spread{margin-top:32px;padding:18px 22px;border:1px solid var(--border);border-top:1px solid var(--gold2);background:var(--surf);position:relative}
.spread::before{content:'✦  POWERS UNLOCKED  ✦';position:absolute;top:-8px;left:50%;transform:translateX(-50%);font-family:'Cinzel',serif;font-size:9px;font-weight:700;letter-spacing:4px;color:var(--gold);background:var(--surf);padding:0 10px;white-space:nowrap}
.spread-bars{display:flex;gap:16px;margin-top:4px;flex-wrap:wrap}
.sbar{flex:1;min-width:120px}
.sbar-labels{display:flex;justify-content:space-between;margin-bottom:5px;font-family:'Cinzel',serif;font-size:9px;font-weight:700;letter-spacing:2px}
.sbar-track{height:5px;background:var(--border);border-radius:3px;overflow:hidden}
.sbar-fill{height:100%;border-radius:3px;transition:width .6s ease}

/* ── MODAL ── */
.modal-overlay{display:none;position:fixed;inset:0;z-index:200;background:#00000088;backdrop-filter:blur(4px);align-items:center;justify-content:center}
.modal-overlay.vis{display:flex}
.modal-box{background:linear-gradient(135deg,#13132a,#07070e);border:1px solid var(--border);border-top:2px solid var(--lewis);border-radius:8px;padding:28px 32px;max-width:480px;width:90%;box-shadow:0 0 60px var(--lewis-glow);animation:fadeUp .22s ease;position:relative}
.modal-close{position:absolute;top:12px;right:14px;background:transparent;border:none;color:var(--dim);font-size:20px;cursor:pointer;transition:color .18s}
.modal-close:hover{color:var(--text)}
.modal-heading{font-family:'Cinzel',serif;font-size:11px;font-weight:700;letter-spacing:4px;color:var(--lewis-acc);text-transform:uppercase;margin-bottom:6px}
.modal-title{font-family:'Cinzel Decorative',serif;font-size:18px;color:var(--text);margin-bottom:14px}
.modal-body{font-size:14px;color:var(--muted);line-height:1.7;margin-bottom:14px}
.modal-list{padding-left:0;list-style:none;display:flex;flex-direction:column;gap:6px}
.modal-list li{display:flex;align-items:center;gap:8px;padding:8px 12px;background:#0a0a1a;border:1px solid var(--border);border-radius:4px;font-size:13px;color:var(--muted)}
.modal-list li::before{content:'✕';color:#f87171;font-size:12px;flex-shrink:0}

/* ── ROLL MODAL ── */
.roll-modal .modal-box{border-top-color:var(--gold)}
.roll-waiting{text-align:center;padding:20px 0}
.roll-waiting .spinner{font-size:32px;animation:spin 1s linear infinite;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}
.roll-result{text-align:center;padding:8px 0}
.roll-dice-display{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin:14px 0}
.roll-die{width:44px;height:44px;border-radius:8px;border:2px solid var(--border);background:var(--surf2);display:flex;align-items:center;justify-content:center;font-family:'Cinzel Decorative',serif;font-size:20px;font-weight:700;transition:all .3s}
.roll-die.highest{border-color:var(--gold);box-shadow:0 0 12px var(--gold2);color:var(--gold)}
.roll-die.one{border-color:var(--fail);color:var(--fail)}
.roll-outcome{font-family:'Cinzel Decorative',serif;font-size:22px;margin:10px 0}
.roll-outcome.success{color:var(--success)}
.roll-outcome.partial{color:var(--partial)}
.roll-outcome.fail{color:var(--fail)}
.roll-ones-prompt{margin-top:12px;padding:10px 14px;background:var(--surf2);border:1px solid var(--gold2);border-radius:6px;font-size:13px;color:var(--gold)}
.track-btns{display:flex;gap:8px;margin-top:8px;justify-content:center}
.track-btn{padding:6px 14px;border-radius:4px;border:1px solid var(--border2);background:var(--surf2);font-family:'Cinzel',serif;font-size:10px;font-weight:700;letter-spacing:2px;cursor:pointer;transition:all .18s}
.track-btn.wisdom{color:#60a5fa;border-color:#60a5fa40}.track-btn.wisdom:hover{background:#60a5fa20}
.track-btn.grit{color:#f87171;border-color:#f8717140}.track-btn.grit:hover{background:#f8717120}
.track-btn.bond{color:#4ade80;border-color:#4ade8040}.track-btn.bond:hover{background:#4ade8020}

/* ── PENDING ROLL BANNER ── */
.pending-banner{display:none;padding:12px 16px;background:linear-gradient(135deg,#1a1a00,#0a0a00);border:1px solid var(--gold);border-radius:6px;margin-bottom:16px;text-align:center;animation:pulse 2s ease-in-out infinite}
.pending-banner.vis{display:block}
@keyframes pulse{0%,100%{box-shadow:0 0 8px var(--gold2)}50%{box-shadow:0 0 20px var(--gold2)}}
.pending-banner p{font-family:'Cinzel',serif;font-size:11px;font-weight:700;letter-spacing:3px;color:var(--gold);text-transform:uppercase}

/* ── ACTION REF ── */
.action-ref{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.action-col h4{font-family:'Cinzel',serif;font-size:10px;font-weight:700;letter-spacing:4px;text-transform:uppercase;color:var(--dim);margin-bottom:8px}
.action-item{padding:6px 10px;background:var(--surf);border:1px solid var(--border);border-radius:4px;font-size:12px;color:var(--muted);line-height:1.4;margin-bottom:5px}
.action-item strong{color:var(--text);display:block;margin-bottom:1px;font-size:12px}

/* ── COMBAT FEATS ── */
.feats-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
@media(min-width:600px){.feats-grid{grid-template-columns:repeat(3,1fr)}}
.feat-card{padding:12px 14px;border-radius:6px;border:1px solid var(--border);background:#06060f;cursor:pointer;transition:all .2s;user-select:none;position:relative}
.feat-card.unlocked{border-color:var(--gold);background:var(--gold2);box-shadow:0 0 10px var(--gold2)}
.feat-card.locked{opacity:.35;cursor:default}
.feat-card:not(.locked):not(.unlocked):hover{border-color:var(--border2);background:var(--surf2);transform:translateY(-1px)}
.feat-name{font-family:'Cinzel',serif;font-size:12px;font-weight:700;letter-spacing:.5px;color:var(--text);margin-bottom:4px}
.feat-card.unlocked .feat-name{color:var(--gold)}
.feat-desc{font-size:12px;color:var(--dim);line-height:1.5}
.feat-card.unlocked .feat-desc{color:var(--muted)}
.feat-type{position:absolute;top:8px;right:10px;font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--dim)}
.feat-card.unlocked .feat-type{color:var(--gold)}
.feat-cost{display:inline-flex;align-items:center;gap:4px;margin-top:6px;font-size:10px;font-weight:700;letter-spacing:1px;color:#f87171;font-family:'Cinzel',serif}
.feats-note{font-size:11px;color:var(--dim);margin-top:8px;font-style:italic}

/* ── TRAITS & DRIVES ── */
.traits-drives-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.td-column h4{font-family:'Cinzel',serif;font-size:10px;font-weight:700;letter-spacing:4px;text-transform:uppercase;margin-bottom:8px}
.td-column.traits h4{color:#60a5fa}
.td-column.drives h4{color:#c084fc}
.td-item{display:flex;align-items:flex-start;gap:8px;padding:10px 12px;background:#06060f;border:1px solid var(--border);border-radius:6px;margin-bottom:6px}
.td-item-text{flex:1;font-size:13px;color:var(--text);line-height:1.5;outline:none;background:transparent;border:none;resize:none;font-family:'Inter',sans-serif;min-height:36px;width:100%}
.td-item-text:focus{color:var(--text)}
.td-item-text::placeholder{color:var(--dim)}
.td-del{width:18px;height:18px;border-radius:3px;border:none;background:transparent;color:var(--dim);cursor:pointer;font-size:13px;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:color .18s;margin-top:2px}
.td-del:hover{color:var(--fail)}
#pb-hero .td-item{background:#fdf6e8;border-color:#c4a87a}
#pb-hero .td-item-text{color:#2c1a08}
#pb-hero .td-item-text::placeholder{color:#9a7d60}

/* ── XP TRACK ── */
.xp-section{display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.xp-pips{display:flex;gap:8px}
.xp-pip{width:28px;height:28px;border-radius:50%;border:2px solid var(--border2);background:var(--surf2);transition:all .3s;position:relative}
.xp-pip.filled{background:var(--gold);border-color:var(--gold);box-shadow:0 0 10px var(--gold2)}
.xp-label{font-family:'Cinzel',serif;font-size:10px;font-weight:700;letter-spacing:3px;color:var(--dim);text-transform:uppercase}
.xp-count{font-family:'Cinzel Decorative',serif;font-size:18px;color:var(--gold)}
#pb-hero .xp-pip{border-color:#c4a87a;background:#ede0c4}
#pb-hero .xp-pip.filled{background:#8b4513;border-color:#a0522d;box-shadow:0 0 8px #8b451344}
#pb-hero .xp-label{color:#7a5c2e}
#pb-hero .xp-count{color:#8b4513}

/* ── JURY PANEL ── */
.jury-panel{display:none;padding:16px;background:linear-gradient(135deg,#1a1a00,#0f0f00);border:2px solid var(--gold);border-radius:8px;margin-bottom:20px;animation:fadeUp .3s ease}
.jury-panel.vis{display:block}
.jury-header{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.jury-title{font-family:'Cinzel Decorative',serif;font-size:15px;color:var(--gold)}
.jury-status{font-size:10px;font-weight:700;letter-spacing:3px;text-transform:uppercase;padding:3px 10px;border-radius:20px;border:1px solid var(--gold);color:var(--gold);margin-left:auto}
.jury-active-item{padding:14px 16px;background:#0a0a00;border:1px solid var(--gold)60;border-radius:6px;margin-bottom:12px}
.jury-item-who{font-family:'Cinzel',serif;font-size:10px;font-weight:700;letter-spacing:3px;text-transform:uppercase;margin-bottom:4px}
.jury-item-type{color:var(--gold)}
.jury-item-text{font-size:15px;color:var(--text);line-height:1.6;font-style:italic;margin-top:4px}
.jury-queue-list{display:flex;flex-direction:column;gap:6px;margin-bottom:12px;max-height:160px;overflow-y:auto}
.jury-queue-item{display:flex;align-items:center;gap:8px;padding:8px 12px;background:#0a0a00;border:1px solid var(--border);border-radius:4px;font-size:12px;color:var(--muted);cursor:pointer;transition:all .18s}
.jury-queue-item:hover{border-color:var(--gold)60;color:var(--text)}
.jury-queue-item.mine{border-color:var(--gold)40;color:var(--gold)}
.jury-queue-item.active-item{border-color:var(--gold);background:var(--gold2);color:var(--gold)}
.jury-queue-item.approved{border-color:var(--success)40;color:var(--success)}
.jury-queue-item.rejected{border-color:var(--fail)40;color:var(--fail);text-decoration:line-through}
.jury-submit-btn{width:100%;padding:10px;border-radius:4px;border:1px solid var(--gold)60;background:transparent;color:var(--gold);font-family:'Cinzel',serif;font-size:11px;font-weight:700;letter-spacing:3px;text-transform:uppercase;cursor:pointer;transition:all .18s;margin-bottom:8px}
.jury-submit-btn:hover{background:var(--gold2)}
.jury-submit-btn:disabled{opacity:.35;cursor:default}
.jury-vote-section{display:none;padding:12px;background:#0a0a00;border:1px solid var(--gold);border-radius:6px;margin-bottom:10px;text-align:center}
.jury-vote-section.vis{display:block}
.jury-vote-prompt{font-family:'Cinzel',serif;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--gold);margin-bottom:10px}
.jury-vote-btns{display:flex;gap:10px;justify-content:center}
.vote-btn{padding:8px 24px;border-radius:4px;font-family:'Cinzel',serif;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:all .18s}
.vote-btn.yes{border:1px solid var(--success);color:var(--success);background:transparent}
.vote-btn.yes:hover{background:#22c55e20}
.vote-btn.no{border:1px solid var(--fail);color:var(--fail);background:transparent}
.vote-btn.no:hover{background:#ef444420}
.vote-btn:disabled{opacity:.35;cursor:default}
.jury-votes-display{display:flex;gap:6px;justify-content:center;margin-top:8px;flex-wrap:wrap}
.voter-chip{font-size:11px;padding:3px 10px;border-radius:20px;font-family:'Cinzel',serif;font-weight:700;letter-spacing:1px}
.voter-chip.yes{background:#22c55e20;border:1px solid #22c55e40;color:var(--success)}
.voter-chip.no{background:#ef444420;border:1px solid #ef444440;color:var(--fail)}
.voter-chip.waiting{background:var(--surf2);border:1px solid var(--border2);color:var(--dim)}

/* ── ADVANCE MODAL ── */
.advance-modal .modal-box{border-top-color:var(--gold);max-width:520px}
.advance-option{padding:12px 14px;background:var(--surf2);border:1px solid var(--border);border-radius:6px;margin-bottom:8px;cursor:pointer;transition:all .18s}
.advance-option:hover{border-color:var(--gold);background:var(--gold2)}
.advance-option h4{font-family:'Cinzel',serif;font-size:12px;font-weight:700;letter-spacing:2px;color:var(--text);margin-bottom:3px}
.advance-option p{font-size:12px;color:var(--muted);line-height:1.4}
.advance-power-list{display:flex;flex-direction:column;gap:6px;margin-top:10px;max-height:260px;overflow-y:auto}
.advance-power-item{padding:10px 12px;background:var(--surf2);border:1px solid var(--border);border-radius:4px;cursor:pointer;transition:all .18s}
.advance-power-item:hover{border-color:var(--gold)}
.advance-power-name{font-family:'Cinzel',serif;font-size:12px;font-weight:700;color:var(--text)}
.advance-power-meta{font-size:11px;color:var(--dim);margin-top:2px}
.advance-back-btn{padding:7px 14px;border-radius:4px;border:1px solid var(--border2);background:transparent;color:var(--muted);font-family:'Cinzel',serif;font-size:10px;font-weight:700;letter-spacing:2px;cursor:pointer;transition:all .18s;margin-top:8px}
.advance-back-btn:hover{border-color:var(--text);color:var(--text)}

/* ── TOAST ── */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(100px);background:var(--surf2);border:1px solid var(--border2);border-radius:6px;padding:10px 20px;font-size:13px;color:var(--text);z-index:300;transition:transform .3s ease;white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0)}

footer{text-align:center;padding:40px 20px;color:var(--dim);font-family:'Cinzel',serif;font-size:9px;font-weight:700;letter-spacing:4px}
</style>
</head>
<body>
<canvas id="bg-canvas"></canvas>
<div class="wrap">

<!-- HEADER -->
<div class="char-header">
  <div class="char-avatar">🐦‍⬛</div>
  <div class="char-info">
    <h1>Lewis</h1>
    <div class="char-sub">Child of the Morrigan</div>
  </div>
  <div class="char-vitals">
    <div class="mortality-display">
      Harm <span class="harm-num" id="header-harm">0</span>
      / <span class="mortality-num" id="header-mortality">—</span> Mortality
      <span class="sync-dot off" id="sync-dot" title="Syncing..."></span>
    </div>
    <div class="mortality-display" style="font-size:10px;margin-top:2px">
      Favor <span style="color:var(--fc);font-family:'Cinzel Decorative',serif;font-size:16px" id="header-favor">0</span>
    </div>
  </div>
</div>

<!-- PENDING ROLL BANNER -->
<div class="pending-banner" id="pending-banner">
  <p>⏳ Waiting for Weaver approval...</p>
</div>

<!-- JURY PANEL -->
<div class="jury-panel" id="jury-panel">
  <div class="jury-header">
    <div class="jury-title">⚖ End of Session — Jury</div>
    <div class="jury-status" id="jury-status-badge">Open</div>
  </div>
  <div id="jury-active-display" style="display:none">
    <div class="jury-active-item">
      <div class="jury-item-who">
        <span id="jury-item-player" style="color:var(--lewis-acc)"></span>
        <span class="jury-item-type" id="jury-item-type"></span>
      </div>
      <div class="jury-item-text" id="jury-item-text"></div>
    </div>
    <div class="jury-vote-section" id="jury-vote-section">
      <div class="jury-vote-prompt">Did they embody this?</div>
      <div class="jury-vote-btns">
        <button class="vote-btn yes" id="vote-yes-btn" onclick="castVote(true)">✓ Yes</button>
        <button class="vote-btn no" id="vote-no-btn" onclick="castVote(false)">✕ No</button>
      </div>
      <div class="jury-votes-display" id="jury-votes-display"></div>
    </div>
  </div>
  <div style="font-family:'Cinzel',serif;font-size:9px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--dim);margin-bottom:6px">Queue</div>
  <div class="jury-queue-list" id="jury-queue-list">
    <div style="color:var(--dim);font-size:12px;font-style:italic;text-align:center;padding:8px">Nothing queued yet.</div>
  </div>
  <div style="font-family:'Cinzel',serif;font-size:9px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--dim);margin-bottom:6px;margin-top:10px">Submit to Queue</div>
  <div id="jury-submit-list"></div>
</div>

<!-- UNDO NOTIFICATION -->
<div class="undo-notif" id="undo-notif">
  <p>⟲ A change was undone by the Weaver — please re-choose your track gain below</p>
</div>

<!-- COMBAT OVERLAY -->
<div class="combat-overlay" id="combat-overlay">
  <div class="co-header">
    <div class="co-title">⚔ Combat</div>
    <div class="co-round" id="co-round-text">Round 1</div>
    <div style="font-size:11px;color:var(--dim);margin-left:12px" id="co-turn-text"></div>
  </div>
  <div class="co-body">
    <!-- Left col: harm, actions, tracks, weapon -->
    <div style="display:flex;flex-direction:column;gap:12px">
      <div class="co-section">
        <div class="co-sec-title">Harm & Status</div>
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
          <span style="font-size:12px;color:var(--dim)">Harm / Mortality</span>
          <span class="co-stat-nums" id="co-harm-nums">0 / 0</span>
        </div>
        <div class="co-harm-bar"><div class="co-harm-fill" id="co-harm-fill" style="width:0%"></div></div>
        <div id="co-conditions" style="margin-top:6px;display:flex;flex-wrap:wrap;gap:4px"></div>
      </div>
      <div class="co-section">
        <div class="co-sec-title">My Actions</div>
        <div class="co-actions" id="co-action-pips"></div>
        <button class="co-join-btn" id="co-join-btn" onclick="joinCombatQueue()">⚔ I Want to Act</button>
      </div>
      <div class="co-section">
        <div class="co-sec-title">Momentum</div>
        <div class="co-tracks">
          <div class="co-track"><span class="co-track-lbl" style="color:#60a5fa">Wisdom</span><div class="co-pips" id="co-wisdom-pips"></div></div>
          <div class="co-track"><span class="co-track-lbl" style="color:#f87171">Grit</span><div class="co-pips" id="co-grit-pips"></div></div>
          <div class="co-track"><span class="co-track-lbl" style="color:#4ade80">Bond</span><div class="co-pips" id="co-bond-pips"></div></div>
        </div>
      </div>
      <div class="co-section">
        <div class="co-sec-title">Equipped Weapon</div>
        <div id="co-weapon-display"><div style="color:var(--dim);font-size:12px;font-style:italic">No weapon equipped.</div></div>
      </div>
    </div>
    <!-- Right col: queue, inventory, action panel -->
    <div style="display:flex;flex-direction:column;gap:12px">
      <div class="co-section">
        <div class="co-sec-title">Queue</div>
        <div class="co-queue-list" id="co-queue-list"><div style="color:var(--dim);font-size:12px;font-style:italic">No one in queue yet.</div></div>
      </div>
      <div class="co-section">
        <div class="co-sec-title">Inventory</div>
        <div id="co-inventory"></div>
      </div>
      <!-- Action panel — shown when it's your turn -->
      <div class="co-actions-panel" id="co-action-panel" style="display:none">
        <h3>Your Turn — Choose an Action</h3>
        <div class="co-action-grid" id="co-action-grid"></div>
      </div>
    </div>
  </div>
</div>


<!-- JURY OVERLAY (full screen) -->
<div id="jury-overlay" style="display:none;position:fixed;inset:0;z-index:200;background:#000000e0;backdrop-filter:blur(8px);flex-direction:column;align-items:center;justify-content:center;gap:20px;padding:24px;text-align:center">
  <div style="font-family:'Cinzel Decorative',serif;font-size:22px;color:var(--gold);letter-spacing:2px">⚖ Jury Session</div>
  <div style="font-family:'Cinzel',serif;font-size:11px;font-weight:700;letter-spacing:4px;color:var(--dim);text-transform:uppercase">Now Discussing</div>
  <div style="font-size:16px;color:var(--text);max-width:500px;line-height:1.7;font-family:'Crimson Pro',serif;font-style:italic" id="jury-ov-text">Waiting for item...</div>
  <div style="display:flex;gap:12px;flex-wrap:wrap;justify-content:center" id="jury-ov-btns"></div>
  <div style="font-size:12px;color:var(--dim)" id="jury-ov-tally"></div>
  <div style="font-size:11px;color:var(--dim);font-style:italic;max-width:400px">Vote honestly. The Weaver sees all results simultaneously.</div>
</div>

<!-- PLAYBOOK TOGGLE -->
<div class="pb-toggle">
  <button class="pb-btn active" onclick="switchPlaybook('hero')">⚔ Hero</button>
  <button class="pb-btn" onclick="switchPlaybook('divine')">🐦‍⬛ The Morrigan</button>
</div>

<!-- ══ HERO PLAYBOOK ══ -->
<div id="pb-hero" class="pb-panel active">

  <!-- SKILLS -->
  <div class="section">
    <div class="section-title">Skills</div>
    <div class="skills-grid" id="skills-grid"></div>
  </div>

  <!-- WISDOM / GRIT / BOND -->
  <div class="section">
    <div class="section-title">Momentum Tracks</div>
    <div class="stat-tracks">
      <div class="stat-track">
        <div class="stat-label wisdom">Wisdom</div>
        <div class="stat-desc">Spend for +1d on any roll</div>
        <div class="stat-pips" id="wisdom-pips"></div>
      </div>
      <div class="stat-track">
        <div class="stat-label grit">Grit</div>
        <div class="stat-desc">Spend for Combat Feats</div>
        <div class="stat-pips" id="grit-pips"></div>
      </div>
      <div class="stat-track">
        <div class="stat-label bond">Bond</div>
        <div class="stat-desc">Spend to help allies (+1d)</div>
        <div class="stat-pips" id="bond-pips"></div>
      </div>
    </div>
    <div style="font-size:11px;color:var(--dim);margin-top:4px">Gain 1 in any track when a die rolls 1 on your roll.</div>
  </div>

  <!-- HARM / CONDITIONS -->
  <div class="section">
    <div class="section-title">Conditions &amp; Harm</div>
    <div class="harm-section">
      <div class="harm-bar-wrap">
        <div class="harm-bar-bg"><div class="harm-bar-fill" id="harm-bar" style="width:0%"></div></div>
        <div class="harm-nums">Harm: <span id="harm-total">0</span> / <span id="mortality-max">0</span></div>
      </div>
      <div class="conditions-list" id="conditions-list">
        <div style="color:var(--dim);font-size:13px;text-align:center;padding:8px">No active conditions.</div>
      </div>
      <div class="add-cond-form" style="margin-top:12px">
        <input class="add-cond-input" id="cond-label" placeholder="Condition (e.g. Sprained Ankle)">
        <input class="add-cond-input" id="cond-harm" placeholder="Harm" type="number" min="1" max="20" style="max-width:80px">
        <button class="add-cond-btn" onclick="addConditionUI()">+ Add</button>
        <button class="add-cond-btn" id="cond-unstable-toggle" onclick="toggleNewUnstable()" style="border-color:var(--dim);color:var(--dim)">Stable</button>
      </div>
    </div>
  </div>

  <!-- INVENTORY -->
  <div class="section">
    <div class="section-title">Inventory</div>
    <div class="inventory-list" id="inventory-list">
      <div style="color:var(--dim);font-size:13px;text-align:center;padding:8px">No items. The Weaver will send equipment.</div>
    </div>
  </div>

  <!-- ACTION REFERENCE - hidden, shown only in combat overlay -->
  <div class="section" style="display:none" id="action-ref-section">
    <div class="section-title">Quick Reference</div>
    <div class="action-ref">
      <div class="action-col">
        <h4>⚔ Actions</h4>
        <div class="action-item"><strong>Attack</strong>Roll damage. Rushed attacks (2nd+) are at disadvantage.</div>
        <div class="action-item"><strong>Combat Feat</strong>Spend 1 Grit to use a trained feat.</div>
        <div class="action-item"><strong>Use Power</strong>Activate an ability from a Playbook.</div>
        <div class="action-item"><strong>Move</strong>Reposition on the field.</div>
        <div class="action-item"><strong>Use Item</strong>Interact with a non-weapon object.</div>
      </div>
      <div class="action-col">
        <h4>🛡 Reactions</h4>
        <div class="action-item"><strong>Shield</strong>Block incoming damage with a shield.</div>
        <div class="action-item"><strong>Defense Feat</strong>Spend 1 Grit to use a trained feat.</div>
        <div class="action-item"><strong>Help Ally</strong>Expend 1 Bond → +1d to their roll.</div>
        <div class="action-item"><strong>Scope</strong>Investigate surroundings. May require a roll.</div>
        <div class="action-item"><strong>Swap Weapons</strong>Change active weapon.</div>
      </div>
    </div>
  </div>

  <!-- COMBAT FEATS -->
  <div class="section">
    <div class="section-title">⚔ Combat Feats</div>
    <div class="feats-grid" id="feats-grid"></div>
    <div class="feats-note">Click a feat to unlock it. Each feat costs 1 Grit to use in combat.</div>
  </div>

  <!-- TRAITS & DRIVES -->
  <div class="section">
    <div class="section-title">Traits &amp; Drives</div>
    <div class="traits-drives-grid">
      <div class="td-column traits">
        <h4>🧠 Traits</h4>
        <div id="traits-list"></div>
        <button class="add-cond-btn" onclick="addTD('trait')" style="margin-top:4px;width:100%">+ Add Trait</button>
      </div>
      <div class="td-column drives">
        <h4>🔥 Drives</h4>
        <div id="drives-list"></div>
        <button class="add-cond-btn" onclick="addTD('drive')" style="margin-top:4px;width:100%;border-color:#c084fc;color:#c084fc">+ Add Drive</button>
      </div>
    </div>
    <div style="font-size:11px;color:var(--dim);margin-top:8px">Two Traits and two Drives. Argue for them in the end-of-session Jury to earn XP.</div>
  </div>

  <!-- XP & ADVANCEMENT -->
  <div class="section">
    <div class="section-title">Experience</div>
    <div class="xp-section">
      <div class="xp-pips" id="xp-pips"></div>
      <div style="font-size:11px;color:var(--dim);max-width:220px;line-height:1.5">Fill all 4 to Advance — gain a new skill point, feat, or divine power.</div>
    </div>
  </div>

</div><!-- end hero -->

<!-- ══ DIVINE PLAYBOOK (Morrigan) ══ -->
<div id="pb-divine" class="pb-panel">

  <!-- FAVOR -->
  <div class="favor-section">
    <div class="favor-top">
      <div class="favor-lbl">Favor</div>
      <div class="favor-num-big" id="favor-num">0</div>
      <div class="favor-slash">/ <span id="fmax-disp">0</span></div>
      <div class="favor-btns">
        <button class="favor-btn" onclick="changeFavor(-1)">−</button>
        <button class="favor-btn" onclick="changeFavor(1)">+</button>
        <button class="refill-btn" onclick="refillFavor()">✦ Refill</button>
      </div>
    </div>
    <div class="favor-tokens" id="favor-tokens"></div>
  </div>

  <!-- DETAIL PANEL -->
  <div id="dp-detail" class="dp-detail"></div>

  <!-- BRANCH TABS -->
  <div class="tabs">
    <button class="tab-btn active" data-b="prophecy" onclick="switchBranch('prophecy')"><span class="tglyph">☽</span>Prophecy</button>
    <button class="tab-btn" data-b="war" onclick="switchBranch('war')"><span class="tglyph">⚔</span>War</button>
    <button class="tab-btn" data-b="sovereignty" onclick="switchBranch('sovereignty')"><span class="tglyph">♛</span>Sovereignty</button>
  </div>

  <!-- PROPHECY -->
  <div id="panel-prophecy" class="bpanel active">
    <div class="bhead">
      <div><div class="btitle" style="color:var(--prophecy-acc)">Prophecy</div><div class="bsub">Bás is Beatha — Death and Life</div></div>
      <div class="bprog" style="color:var(--prophecy-acc)"><span class="cnt" id="prog-prophecy">0</span>/ 8 powers</div>
    </div>
    <div class="tier"><div class="tier-head"><span>Tier I · Foundation</span><div class="tier-rule"></div></div>
    <div class="tgrid c2">
      <div class="node avail" id="p1" data-b="prophecy" style="--nc:var(--prophecy);--na:var(--prophecy-acc);--ng:var(--prophecy-glow);--nb:var(--prophecy-bg)" onclick="toggleNode(this)">
        <div class="nbadges"><span class="badge b-pass">Passive</span><span class="badge b-roll">Wits</span></div>
        <div class="npip"></div><div class="nname">Crow's Eye</div>
        <div class="ndesc">Perceive the spiritual weight of any place. Ask the Keeper questions about what lingers here.</div>
      </div>
      <div class="node avail" id="p2" data-b="prophecy" data-favor="2" style="--nc:var(--prophecy);--na:var(--prophecy-acc);--ng:var(--prophecy-glow);--nb:var(--prophecy-bg)" onclick="toggleNode(this)">
        <div class="nbadges"><span class="badge b-roll">Roll: Search</span><span class="badge b-fav">2 Favor</span></div>
        <div class="npip"></div><div class="nname">Read Intent</div>
        <div class="ndesc">Study a person to learn what they're about to do — before they do it.</div>
      </div>
    </div></div>
    <div class="tier"><div class="tier-head"><span>Tier II · Awakening</span><div class="tier-rule"></div></div>
    <div class="tgrid c3">
      <div class="node locked" id="p3" data-b="prophecy" data-prereq="p1" data-favor="2" style="--nc:var(--prophecy);--na:var(--prophecy-acc);--ng:var(--prophecy-glow);--nb:var(--prophecy-bg)" onclick="toggleNode(this)">
        <div class="nbadges"><span class="badge b-roll">Roll: Wits</span><span class="badge b-fav">2 Favor</span></div>
        <div class="npip"></div><div class="nname">Foretelling</div>
        <div class="ndesc">Enter a trance to see what's coming. Ask questions about the shape of what's fated.</div>
        <div class="npre">Requires: Crow's Eye</div>
      </div>
      <div class="node locked" id="p4" data-b="prophecy" data-prereq="p2" data-favor="2" data-levels="1d6,2d6,3d6" style="--nc:var(--prophecy);--na:var(--prophecy-acc);--ng:var(--prophecy-glow);--nb:var(--prophecy-bg)" onclick="toggleNode(this)">
        <div class="nbadges"><span class="badge b-roll">Roll: Nimble</span><span class="badge b-fav">2 Favor</span></div>
        <div class="npip"></div><div class="nname">Fated Blow</div>
        <div class="ndice"><span class="dval" id="p4-dice">1d6</span></div>
        <div class="ndesc">Strike the instant fate lines up. A spectral crow dives alongside you, talons first.</div>
        <div class="npre">Requires: Read Intent</div>
      </div>
      <div class="node locked" id="p5" data-b="prophecy" data-prereq="p1" style="--nc:var(--prophecy);--na:var(--prophecy-acc);--ng:var(--prophecy-glow);--nb:var(--prophecy-bg)" onclick="toggleNode(this)">

<script>
const SUPABASE_URL='https://hcrfqtwpraerheiuirem.supabase.co';
const SUPABASE_KEY='sb_publishable_C3dTYXnpaYOg1QCBgXMcBQ_V9cE4Na1';
const {createClient}=supabase;
const db=createClient(SUPABASE_URL,SUPABASE_KEY);
const CHAR_ID='lewis';

// ── STATE ──
let charData={wisdom:0,grit:0,bond:0,favor_current:0};
let skillData={};
let conditions=[];
let unlockedPowers=new Set();
let nodeLevels={};
let inventoryData=[];
let currentBranch='prophecy';
let newCondUnstable=false;
let pendingRollId=null;
let currentRollSkill=null;

// ── SKILLS LIST ──
const SKILLS=['Notice','Persuade','Search','Wits','Might','Nimble','Sneak','Tough','Care','Charm','Deceive','Intimidate'];

// ── COMPUTED ──
function getTotalDice(){return SKILLS.reduce((s,sk)=>s+(skillData[sk]||0),0);}
function getMortality(){return getTotalDice();}
function getTotalHarm(){return conditions.reduce((s,c)=>s+c.harm,0);}

// ── INIT ──
async function init(){
  await loadCharacter();
  await loadSkills();
  await loadConditions();
  await loadPowers();
  await loadInventory();
  await checkPendingRoll();
  await loadExtended();
  await loadCombatState();
  buildSkillsGrid();
  buildStatPips();
  buildFavorTokens();
  updateHarmDisplay();
  updateSpread();
  subscribeAll();
  subscribeExtended();
  subscribeNotifications();
  setSyncDot(true);
  startCanvas();
}

// ── SUPABASE LOAD ──
async function loadCharacter(){
  const{data}=await db.from('characters').select('*').eq('id',CHAR_ID).single();
  if(data){charData=data;applyCharData();}
}
async function loadSkills(){
  const{data}=await db.from('character_skills').select('*').eq('character_id',CHAR_ID);
  if(data) data.forEach(r=>{skillData[r.skill]=r.dice;});
}
async function loadConditions(){
  const{data}=await db.from('conditions').select('*').eq('character_id',CHAR_ID).order('created_at');
  conditions=data||[];
  renderConditions();
}
async function loadPowers(){
  const{data}=await db.from('unlocked_powers').select('*').eq('character_id',CHAR_ID);
  if(data){
    unlockedPowers=new Set(data.map(r=>r.power_id));
    data.forEach(r=>{nodeLevels[r.power_id]=r.level;});
    applyPowerStates();
  }
}
async function loadInventory(){
  const{data}=await db.from('equipment').select('*').eq('owner_id',CHAR_ID).eq('owner_type','character').order('created_at');
  inventoryData=data||[];
  renderInventory();
}
async function checkPendingRoll(){
  const{data}=await db.from('pending_rolls').select('*').eq('character_id',CHAR_ID).eq('status','waiting').order('created_at').limit(1);
  if(data&&data.length>0){
    pendingRollId=data[0].id;
    currentRollSkill=data[0].skill;
    document.getElementById('pending-banner').classList.add('vis');
  }
}

// ── APPLY DATA ──
function applyCharData(){
  buildStatPips();
  buildFavorTokens();
}

// ── SUBSCRIPTIONS ──
function subscribeAll(){
  db.channel('lewis-char').on('postgres_changes',{event:'*',schema:'public',table:'characters',filter:`id=eq.${CHAR_ID}`},payload=>{
    charData={...charData,...payload.new};applyCharData();
  }).subscribe();
  db.channel('lewis-cond').on('postgres_changes',{event:'*',schema:'public',table:'conditions',filter:`character_id=eq.${CHAR_ID}`},()=>{
    loadConditions();
  }).subscribe();
  db.channel('lewis-powers').on('postgres_changes',{event:'*',schema:'public',table:'unlocked_powers',filter:`character_id=eq.${CHAR_ID}`},()=>{
    loadPowers();
  }).subscribe();
  db.channel('lewis-equip').on('postgres_changes',{event:'*',schema:'public',table:'equipment',filter:`owner_id=eq.${CHAR_ID}`},()=>{
    loadInventory();
  }).subscribe();
  db.channel('lewis-rolls').on('postgres_changes',{event:'*',schema:'public',table:'pending_rolls',filter:`character_id=eq.${CHAR_ID}`},payload=>{
    handleRollUpdate(payload);
  }).subscribe();
}

// ── SKILLS UI ──
function buildSkillsGrid(){
  const grid=document.getElementById('skills-grid');
  grid.innerHTML='';
  SKILLS.forEach(sk=>{
    const dice=skillData[sk]||0;
    const row=document.createElement('div');
    row.className='skill-row';
    row.innerHTML=`<span class="skill-name">${sk}</span>
      <div class="skill-boxes" id="sboxes-${sk}"></div>
      <span class="skill-dice" id="sdice-${sk}">${dice||'0'}d6</span>
      <button class="skill-roll-btn" title="Roll ${sk}" onclick="initiateRoll('${sk}',event)">🎲</button>`;
    grid.appendChild(row);
    buildSkillBoxes(sk,dice);
  });
  updateMortalityDisplay();
}
function buildSkillBoxes(skill,checked){
  const container=document.getElementById(`sboxes-${skill}`);
  if(!container) return;
  container.innerHTML='';
  for(let i=1;i<=4;i++){
    const box=document.createElement('div');
    // Read-only — no onclick
    box.className='sbox'+(i<=checked?' checked':'');
    container.appendChild(box);
  }
}
function updateMortalityDisplay(){
  const total=getTotalDice();
  document.getElementById('total-dice').textContent=total;
  document.getElementById('mortality-display').textContent=total;
  document.getElementById('header-mortality').textContent=total;
  document.getElementById('mortality-max').textContent=total;
  document.getElementById('fmax-disp').textContent=total;
  buildFavorTokens();
  updateHarmBar();
}

// ── STAT PIPS ── (read-only display — DM controls momentum)
function buildStatPips(){
  ['wisdom','grit','bond'].forEach(track=>{
    const container=document.getElementById(`${track}-pips`);
    if(!container) return;
    container.innerHTML='';
    const val=charData[track]||0;

function buildFavorTokens(){
  const mortality=getMortality();
  const max=mortality||charData.favor_max||15;
  const current=Math.min(charData.favor_current||0,max);
  const container=document.getElementById('favor-tokens');
  const numEl=document.getElementById('favor-num');
  const maxEl=document.getElementById('fmax-disp');
  const headerEl=document.getElementById('header-favor');
  if(!container) return;
  container.innerHTML='';
  for(let i=1;i<=max;i++){
    const t=document.createElement('div');
    t.className='ftok'+(i<=current?' on':'');
    t.onclick=()=>setFavor(i<=current?i-1:i);
    container.appendChild(t);
  }
  if(numEl) numEl.textContent=current;
  if(maxEl) maxEl.textContent=max;
  if(headerEl) headerEl.textContent=current;
}
async function setFavor(n){
  const max=getMortality()||charData.favor_max||15;
  const val=Math.max(0,Math.min(n,max));
  charData.favor_current=val;

  await db.from('characters').update({favor_current:val,updated_at:new Date().toISOString()}).eq('id',CHAR_ID);
}

// ── ABILITY USE SYSTEM ──
async function useAbility(nodeId, favorCost){
  const data=ND[nodeId];if(!data)return;
  const powerName=data.name;
  const content=data.content;

  // Passive abilities just notify
  if(content.type==='passive'){
    await notifyDMAbilityUse(powerName, favorCost?`−${favorCost} Favor`:'Passive', nodeId);
    showToast(`${powerName} — Weaver notified`);
    return;
  }

  // Extract skill from roll string e.g. "Roll Wits. Spend 2 Favor."
  const rollStr=content.roll||'';
  const skillMatch=rollStr.match(/Roll[:\s]+([A-Za-z]+)/i);
  const skill=skillMatch?skillMatch[1]:null;

  // Roll dice
  const baseDice=skill?(skillData[skill]||0):1;
  const isZero=baseDice===0;
  const diceCount=isZero?2:baseDice;
  const results=[];
  for(let i=0;i<diceCount;i++) results.push(Math.ceil(Math.random()*6));
  const relevant=isZero?Math.min(...results):Math.max(...results);
  const ones=results.filter(r=>r===1).length;

  let outcomeIdx=0;
  let outcomeClass='fail';
  if(relevant>=6){outcomeIdx=0;outcomeClass='success';}
  else if(relevant>=4){outcomeIdx=1;outcomeClass='partial';}
  else{outcomeIdx=2;outcomeClass='fail';}

  const outcome=content.outcomes[outcomeIdx];

  // Check for damage die from levels
  const el=document.getElementById(nodeId);
  const levelStr=el?.dataset.levels;
  const levelArr=levelStr?levelStr.split(','):null;
  const currentLevel=nodeLevels[nodeId]||0;
  const damageDie=levelArr?levelArr[currentLevel]:null;
  let damageRoll=null;
  if(damageDie&&outcomeClass!=='fail'){
    damageRoll=rollDieStr(damageDie);
    // On fail, roll one level down
    if(outcomeClass==='fail'&&currentLevel>0){
      damageRoll=rollDieStr(levelArr[currentLevel-1]);
    }
  }

  // Show result modal
  showAbilityResult(nodeId,powerName,skill,results,relevant,outcomeClass,outcome,damageDie,damageRoll,ones,isZero);

  // Log to roll log
  if(skill){
    const outcomeKey=outcomeClass==='success'?'success':outcomeClass==='partial'?'mixed':'fail';
    await db.from('roll_log').insert({character_id:CHAR_ID,skill:`${powerName} (${skill})`,dice_rolled:diceCount,results,highest:relevant,outcome:outcomeKey,ones_count:ones,modifier:0});
  }

  // Notify DM with result
  const resultLabel=outcomeClass==='success'?'Full Success':outcomeClass==='partial'?'Mixed':'Failure';
  const dmDesc=`${skill?`Rolled ${relevant} — ${resultLabel}`:'Used'}${damageDie&&damageRoll?` · ${damageRoll} harm (${damageDie})`:''}`;
  await notifyDMAbilityUse(powerName, favorCost?`${dmDesc} · −${favorCost} Favor`:dmDesc, nodeId);

  // Auto-handle momentum from ones
  if(ones>0) pendingOnesCount=ones;
}

let pendingRollWisdomBoost=false;

async function initiateRoll(skill,event){
  event.stopPropagation();
  const wisdom=charData.wisdom||0;
  if(wisdom>0){
    // Ask if they want to use Wisdom
    showWisdomPrompt(skill);

function showWisdomPrompt(skill){
  const modal=document.getElementById('roll-modal');
  const content=document.getElementById('roll-modal-content');
  content.innerHTML=`
    <div class="wisdom-prompt">
      <p>You have <strong style="color:#60a5fa">${charData.wisdom} Wisdom</strong>. Spend 1 for +1d on this roll?</p>
      <div class="wisdom-btns">
        <button class="wisdom-yes" onclick="resolveWisdomPrompt('${skill}',true)">✓ Yes — spend 1</button>

async function resolveWisdomPrompt(skill,useWisdom){
  document.getElementById('roll-modal').classList.remove('vis');
  if(useWisdom){
    // Deduct 1 wisdom immediately
    const newWisdom=Math.max(0,(charData.wisdom||0)-1);
    charData.wisdom=newWisdom;
    buildStatPips();
    await db.from('characters').update({wisdom:newWisdom,updated_at:new Date().toISOString()}).eq('id',CHAR_ID);
  }
  await fireRollRequest(skill,useWisdom);
}

async function fireRollRequest(skill,wisdomBoost){
  const baseDice=skillData[skill]||0;
  // 0 dice = roll 2d6 take lower — send as special flag
  const sendDice=baseDice===0?-2:baseDice+(wisdomBoost?1:0);
  const{data,error}=await db.from('pending_rolls').insert({
    character_id:CHAR_ID,skill,
    base_dice:Math.abs(sendDice),
    modifier:0,status:'waiting',
    zero_skill:baseDice===0
  }).select().single();
  if(error){showToast('Error sending roll request');return;}
  pendingRollId=data.id;
  currentRollSkill=skill;
  document.getElementById('pending-banner').classList.add('vis');
  document.getElementById('pending-banner').querySelector('p').textContent=
    `⏳ Rolling ${skill}${baseDice===0?' (0 skill — take lower)':` (${Math.abs(sendDice)}d6)`} — Awaiting Weaver...`;
}

async function handleRollUpdate(payload){
  const row=payload.new||payload;
  if(!row||row.character_id!==CHAR_ID) return;
  if(row.status==='confirmed'&&row.id===pendingRollId){
    document.getElementById('pending-banner').classList.remove('vis');
    fireRoll(row);
  } else if(row.status==='cancelled'&&row.id===pendingRollId){
    document.getElementById('pending-banner').classList.remove('vis');
    pendingRollId=null;
    showToast('Roll cancelled by Weaver');
  }
}

function fireRoll(rollData){
  const isZeroSkill=rollData.zero_skill||rollData.base_dice===0;
  const diceCount=isZeroSkill?2:Math.max(1,(rollData.base_dice||1)+(rollData.modifier||0));
  const results=[];
  for(let i=0;i<diceCount;i++) results.push(Math.ceil(Math.random()*6));
  // 0-skill: take the LOWER of the two dice
  const relevant=isZeroSkill?Math.min(...results):Math.max(...results);
  const ones=results.filter(r=>r===1).length;
  let outcome,outcomeClass;
  if(relevant>=6){outcome='Full Success';outcomeClass='success';}
  else if(relevant>=4){outcome='Mixed Success';outcomeClass='partial';}
  else{outcome='Failure';outcomeClass='fail';}
  showRollResult(rollData.skill,results,relevant,outcome,outcomeClass,ones,rollData.modifier||0,isZeroSkill);
  logRoll(rollData.skill,diceCount,results,relevant,outcome,ones,rollData.modifier||0);
  if(rollData.id) db.from('pending_rolls').update({status:'completed'}).eq('id',rollData.id);
  pendingRollId=null;
}

    let cls='roll-die';
    if(isZeroSkill){if(r===Math.min(...results))cls+=' highest';} // highlight the kept die (lowest)
    else{if(r===highest&&results.indexOf(r)===i)cls+=' highest';}
    if(r===1)cls+=' one';
    return `<div class="${cls}">${r}</div>`;
  }).join('');
  let modHtml=modifier!==0?`<div style="font-size:12px;color:var(--muted);margin-bottom:8px">Modifier: ${modifier>0?'+':''}${modifier}</div>`:'';
  let zeroHtml=isZeroSkill?`<div style="font-size:11px;color:var(--dim);margin-bottom:6px;font-style:italic">No skill — rolling 2d6, taking lowest</div>`:'';

  // Bond button — show if bond > 0 and roll is still pending queue
  const bond=charData.bond||0;
  let bondHtml=bond>0?`<div style="margin-top:10px"><button class="bond-btn" id="bond-apply-btn" onclick="showBondApplication('${skill}')">🤝 Apply Bond (+1d)</button></div>`:'';

function showBondApplication(skill){
  // Show a list of pending rolls in queue to apply bond to
  const content=document.getElementById('roll-modal-content');
  const bond=charData.bond||0;
  if(bond<=0){showToast('No Bond available');return;}
  // Apply bond to current roll — add +1d modifier to any pending roll for this character
  if(pendingRollId){
    applyBond(pendingRollId,skill);
  } else {
    // Show confirmation
    const div=document.createElement('div');
    div.style.cssText='padding:10px;background:var(--surf2);border:1px solid #4ade8040;border-radius:6px;margin-top:10px';
    div.innerHTML=`<div style="font-size:13px;color:var(--muted);margin-bottom:8px">Apply 1 Bond (+1d) to this roll?</div>
      <div style="display:flex;gap:8px">
        <button class="bond-btn" onclick="applyBond(null,'${skill}')">Apply Bond</button>
        <button style="padding:6px 14px;border-radius:4px;border:1px solid var(--border2);background:transparent;color:var(--muted);font-size:12px;cursor:pointer" onclick="this.parentElement.parentElement.remove()">Cancel</button>
      </div>`;
    document.getElementById('roll-modal-content').appendChild(div);
  }
}

async function applyBond(rollId,skill){
  const bond=charData.bond||0;if(bond<=0)return;
  const newBond=bond-1;
  const oldBond=bond;
  charData.bond=newBond;
  buildStatPips();
  await db.from('characters').update({bond:newBond,updated_at:new Date().toISOString()}).eq('id',CHAR_ID);
  // Log the bond spend
  await logMomentumChange('bond',oldBond,newBond,'Bond spent for +1d');
  // If there's an active pending roll, bump its dice
  if(rollId){
    await db.from('pending_rolls').update({modifier:1,updated_at:new Date().toISOString()}).eq('id',rollId);
    showToast('Bond applied — +1d on this roll');
  } else {
    showToast('Bond spent — tell the Weaver');
  }
  document.getElementById('bond-apply-btn')?.remove();
}

async function gainTrack(track,amount){
  const current=charData[track]||0;
  const newVal=Math.min(4,current+amount);
  const oldVal=current;
  charData[track]=newVal;
  buildStatPips();
  await db.from('characters').update({[track]:newVal,updated_at:new Date().toISOString()}).eq('id',CHAR_ID);
  // Log to change_log for DM undo
  await logMomentumChange(track,oldVal,newVal,`Momentum: ${track} gained ${amount} (from roll)`);
  showToast(`${track.charAt(0).toUpperCase()+track.slice(1)} +${amount}`);
  // Remove the ones prompt
  document.querySelector('.roll-ones-prompt')?.remove();
}

async function logMomentumChange(track,oldVal,newVal,desc){
  const typeMap={wisdom:'momentum_wisdom',grit:'momentum_grit',bond:'momentum_bond'};
  await db.from('change_log').insert({
    character_id:CHAR_ID,
    change_type:typeMap[track]||'momentum_wisdom',
    description:desc,
    old_value:JSON.stringify({[track]:oldVal}),
    new_value:JSON.stringify({[track]:newVal})
  });
}

async function logRoll(skill,diceRolled,results,highest,outcome,ones,modifier){

  await db.from('roll_log').insert({character_id:CHAR_ID,skill,dice_rolled:diceRolled,results,highest,outcome:outcomeKey,ones_count:ones,modifier});
}
