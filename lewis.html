function getPrereqs(el){const p=el.dataset.prereq;return p?p.split(','):[]}
function prereqsMet(el){return getPrereqs(el).every(id=>unlockedPowers.has(id))}
function hasDependent(id){for(const n of document.querySelectorAll('.node')){if(getPrereqs(n).includes(id)&&unlockedPowers.has(n.id))return true;}return false;}
function updateAllLocks(){document.querySelectorAll('.node').forEach(n=>{if(unlockedPowers.has(n.id))return;if(prereqsMet(n)){n.classList.remove('locked');n.classList.add('avail');}else{n.classList.remove('avail','unlocked');n.classList.add('locked');}});}

async function toggleNode(el){
  const id=el.id;
  if(el.classList.contains('locked')){showPrereqModalUI(el);return;}
  showNodeDetail(id,el);
  if(unlockedPowers.has(id)){
    if(hasDependent(id)){showToast("Another power depends on this one");return;}
    unlockedPowers.delete(id);
    el.classList.remove('unlocked');el.classList.add('avail');
    await db.from('unlocked_powers').delete().eq('character_id',CHAR_ID).eq('power_id',id);
  } else {
    unlockedPowers.add(id);
    el.classList.remove('avail');el.classList.add('unlocked');
    await db.from('unlocked_powers').upsert({character_id:CHAR_ID,power_id:id,level:nodeLevels[id]||0});
  }
  updateAllLocks();refreshDice(el,id);updateSpread();updateProgress();
}

function applyPowerStates(){
  document.querySelectorAll('.node').forEach(n=>{
    const id=n.id;
    if(unlockedPowers.has(id)){n.classList.add('unlocked');n.classList.remove('avail','locked');}
    else if(prereqsMet(n)){n.classList.add('avail');n.classList.remove('unlocked','locked');}
    else{n.classList.add('locked');n.classList.remove('unlocked','avail');}
    refreshDice(n,id);
  });
  updateSpread();updateProgress();
}

function refreshDice(el,id){
  const lv=el.dataset.levels;if(!lv)return;
  const arr=lv.split(',');const lvl=nodeLevels[id]||0;
  const dEl=document.getElementById(`${id}-dice`);if(dEl)dEl.textContent=arr[lvl];
  const row=el.querySelector('.ndice');if(!row)return;
  let btns=row.querySelector('.lvl-btns');let maxb=row.querySelector('.nmaxbadge');
  if(unlockedPowers.has(id)){
    if(!btns){btns=document.createElement('div');btns.className='lvl-btns';row.appendChild(btns);}
    btns.innerHTML='';
    if(lvl>0){const dn=document.createElement('button');dn.className='lvl-btn';dn.textContent='↓';dn.onclick=e=>{e.stopPropagation();levelChange(id,el,-1);};btns.appendChild(dn);}
    if(lvl<arr.length-1){const up=document.createElement('button');up.className='lvl-btn';up.textContent='↑ Level';up.onclick=e=>{e.stopPropagation();levelChange(id,el,1);};btns.appendChild(up);}
    if(lvl===arr.length-1){if(!maxb){maxb=document.createElement('span');maxb.className='nmaxbadge';maxb.textContent='✦ MAX';row.appendChild(maxb);}}
    else{if(maxb)maxb.remove();}
  }else{if(btns)btns.remove();if(maxb)maxb.remove();}
}

async function levelChange(id,el,delta){
  const arr=el.dataset.levels.split(',');const cur=nodeLevels[id]||0;const next=cur+delta;
  if(next>=0&&next<arr.length){
    nodeLevels[id]=next;refreshDice(el,id);
    if(document.getElementById('dp-detail').classList.contains('vis')) showNodeDetail(id,el);
    await db.from('unlocked_powers').update({level:next,updated_at:new Date().toISOString()}).eq('character_id',CHAR_ID).eq('power_id',id);
  }
}

function showNodeDetail(id,el){
  const data=ND[id];if(!data)return;
  const branch=(el.dataset.b||'prophecy');
  const accMap={prophecy:'var(--prophecy-acc)',war:'var(--war-acc)',sovereignty:'var(--sovereignty-acc)'};
  const goldMap={prophecy:'var(--prophecy)',war:'var(--war)',sovereignty:'var(--sovereignty)'};
  const bgMap={prophecy:'#2d1b6910',war:'#7f1d1d10',sovereignty:'#06402410'};
  const glowMap={prophecy:'var(--prophecy-glow)',war:'var(--war-glow)',sovereignty:'var(--sovereignty-glow)'};
  const panel=document.getElementById('dp-detail');
  panel.style.setProperty('--dpbg',bgMap[branch]);
  panel.style.setProperty('--dpglow',glowMap[branch]);
  panel.style.setProperty('--dpacc',accMap[branch]);
  panel.classList.add('vis');
  const favor=el.dataset.favor;
  const isUnlocked=unlockedPowers.has(id);
  let lvlHtml='';
  if(data.levels){
    const lvl=nodeLevels[id]||0;
    lvlHtml=`<div style="margin-bottom:10px">`;
    data.levels.forEach((l,i)=>{const cur=i===lvl;lvlHtml+=`<span style="font-family:'Cinzel Decorative',serif;font-size:13px;color:${cur?accMap[branch]:'var(--dim)'};margin-right:10px">${cur?'▶ ':''} ${l}</span>`;});
    lvlHtml+='</div>';
  }
  let contentHtml='';
  const c=data.content;
  if(c.type==='passive'){
    contentHtml=`<div class="passive-block">${c.desc}</div>`;
  } else {
    let outHtml=c.outcomes.map(o=>`<div class="outcome ${o.cls}"><div class="opic"></div><div><span class="olabel">${o.label}</span><div class="otext">${o.text}</div></div></div>`).join('');
    let qHtml='';
    if(c.questions){qHtml=`<div class="q-list"><div class="q-list-lbl">Questions to Ask</div><ul>${c.questions.map(q=>`<li>${q}</li>`).join('')}</ul></div>`;}
    contentHtml=`<div class="move-block"><div class="move-trigger">When to Use</div><div class="move-roll-line">${c.trigger}<br><br><strong>${c.roll||''}</strong></div><div class="move-outcomes">${outHtml}</div>${qHtml}</div>`;

    useHtml=`<button class="use-btn" id="use-btn-${id}" onclick="useFavor(${favor},'${id}')">Use Power <span class="ub-cost">−${favor} Favor</span></button>`;

// ── CANVAS ──
function startCanvas(){
  const canvas=document.getElementById('bg-canvas');
  const ctx=canvas.getContext('2d');
  let particles=[];
  function resize(){canvas.width=window.innerWidth;canvas.height=window.innerHeight;}
  function initP(){particles=[];for(let i=0;i<50;i++)particles.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,r:Math.random()*1.2+.3,vx:(Math.random()-.5)*.1,vy:(Math.random()-.5)*.1,a:Math.random()*.35+.08});}
  const BC={prophecy:'124,58,237',war:'185,28,28',sovereignty:'4,120,87'};
  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    const c=BC[currentBranch]||'124,58,237';
    const g=ctx.createRadialGradient(canvas.width/2,0,0,canvas.width/2,canvas.height*.6,canvas.height*.8);
    g.addColorStop(0,`rgba(${c},.07)`);g.addColorStop(1,'transparent');
    ctx.fillStyle=g;ctx.fillRect(0,0,canvas.width,canvas.height);
    particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;if(p.x<0)p.x=canvas.width;if(p.x>canvas.width)p.x=0;if(p.y<0)p.y=canvas.height;if(p.y>canvas.height)p.y=0;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle=`rgba(${c},${p.a*.4})`;ctx.fill();});
    requestAnimationFrame(draw);
  }
  resize();initP();draw();
  window.addEventListener('resize',()=>{resize();initP();});
}

    updateAllLocks();refreshDice(el,id);updateSpread();updateProgress();
    showToast(ND[id]?.name+' unlocked!');
  } else {
    const arr=el.dataset.levels?.split(',')||[];
    const cur=nodeLevels[id]||0;
    const next=Math.min(cur+1,arr.length-1);
    nodeLevels[id]=next;
    refreshDice(el,id);
    await db.from('unlocked_powers').update({level:next,updated_at:new Date().toISOString()}).eq('character_id',CHAR_ID).eq('power_id',id);
    showToast(ND[id]?.name+' leveled up!');
  }
  closeAdvanceModal();
  completeAdvance();
}

  renderJuryQueue();
  renderJuryActiveItem();
  renderJurySubmitList();
}
function renderJuryQueue(){
  const list=document.getElementById('jury-queue-list');
  if(!list) return;
  if(!juryQueue||juryQueue.length===0){
    list.innerHTML='<div style="color:var(--dim);font-size:12px;font-style:italic;text-align:center;padding:8px">Nothing queued yet.</div>';
    return;
  }
  list.innerHTML='';
  juryQueue.forEach(item=>{
    const isMine=item.character_id===CHAR_ID;
    const statusClass=item.status==='active'?'active-item':item.status==='approved'?'approved':item.status==='rejected'?'rejected':'';
    const statusIcon=item.status==='approved'?'✓ ':item.status==='rejected'?'✕ ':item.status==='active'?'▶ ':'';
    const div=document.createElement('div');
    div.className=`jury-queue-item ${isMine?'mine':''} ${statusClass}`;
    div.innerHTML=`<span style="font-family:'Cinzel',serif;font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;min-width:50px">${item.character_id}</span>
      <span style="font-size:9px;color:var(--dim);text-transform:uppercase;font-weight:700;letter-spacing:1px;min-width:36px">${item.item_type}</span>
      <span style="flex:1">${statusIcon}${item.item_text||''}</span>`;
    list.appendChild(div);
  });

function renderJuryActiveItem(){
  const active=juryQueue.find(q=>q.status==='active');
  const display=document.getElementById('jury-active-display');
  const voteSection=document.getElementById('jury-vote-section');
  if(!display) return;
  if(!active){display.style.display='none';return;}
  display.style.display='block';
  document.getElementById('jury-item-player').textContent=active.character_id.charAt(0).toUpperCase()+active.character_id.slice(1)+' · ';
  document.getElementById('jury-item-type').textContent=active.item_type.toUpperCase();
  document.getElementById('jury-item-text').textContent=active.item_text||'';
  // Voting — can't vote on your own item
  const canVote=active.character_id!==CHAR_ID;
  const myVote=juryVotes.find(v=>v.voter_id===CHAR_ID);
  voteSection.classList.add('vis');
  document.getElementById('vote-yes-btn').disabled=!canVote||!!myVote;
  document.getElementById('vote-no-btn').disabled=!canVote||!!myVote;
  if(!canVote){
    document.getElementById('vote-yes-btn').style.display='none';
    document.getElementById('vote-no-btn').style.display='none';
    const prompt=document.querySelector('.jury-vote-prompt');
    if(prompt) prompt.textContent='This is your item — others are voting.';
  }
  // Show votes
  const votesDisplay=document.getElementById('jury-votes-display');
  if(votesDisplay){
    votesDisplay.innerHTML=juryVotes.map(v=>`<span class="voter-chip ${v.vote?'yes':'no'}">${v.voter_id} ${v.vote?'✓':'✕'}</span>`).join('');
  }

function renderJurySubmitList(){
  const container=document.getElementById('jury-submit-list');
  if(!container||!jurySession) return;
  const allItems=[...traitsData,...drivesData];
  const alreadyQueued=new Set(juryQueue.filter(q=>q.character_id===CHAR_ID).map(q=>q.trait_drive_id));
  const available=allItems.filter(item=>item.text&&item.text.trim()&&!alreadyQueued.has(item.id));
  if(available.length===0){
    container.innerHTML='<div style="color:var(--dim);font-size:12px;font-style:italic">All your traits/drives are queued, or none are filled in yet.</div>';
    return;
  }
  container.innerHTML='';
  available.forEach(item=>{
    const btn=document.createElement('button');
    btn.className='jury-submit-btn';
    btn.innerHTML=`<span style="font-size:9px;color:var(--dim);letter-spacing:2px;text-transform:uppercase;margin-right:8px">${item.type}</span>${item.text}`;
    btn.onclick=()=>submitToJuryQueue(item);
    container.appendChild(btn);
  });
}
async function submitToJuryQueue(item){
  if(!jurySession){showToast('No jury session open');return;}
  const position=juryQueue.length+1;
  const{data,error}=await db.from('jury_queue').insert({
    session_id:jurySession.id,
    character_id:CHAR_ID,
    item_type:item.type,
    item_text:item.text,
    trait_drive_id:item.id,
    status:'queued',
    position
  }).select().single();
  if(error){showToast('Error submitting');console.error(error);return;}
  juryQueue.push(data);
  renderJuryPanel();
  showToast('Added to jury queue');
}
async function castVote(voteYes){
  const active=juryQueue.find(q=>q.status==='active');
  if(!active){showToast('Nothing to vote on');return;}
  if(active.character_id===CHAR_ID){showToast("You can't vote on your own item");return;}
  const existing=juryVotes.find(v=>v.voter_id===CHAR_ID);
  if(existing){showToast('Already voted');return;}
  const{data,error}=await db.from('jury_votes').insert({queue_item_id:active.id,voter_id:CHAR_ID,vote:voteYes}).select().single();
  if(error){showToast('Error casting vote');console.error(error);return;}
  juryVotes.push(data);
  document.getElementById('vote-yes-btn').disabled=true;
  document.getElementById('vote-no-btn').disabled=true;
  renderJuryActiveItem();
  showToast(voteYes?'Voted Yes':'Voted No');
}

// ── COMBAT OVERLAY ──
let combatSessionData=null;
let combatParticipantData=null;
let myQueueItem=null;
let combatQueueData=[];

async function loadCombatState(){
  const{data}=await db.from('dm_settings').select('combat_active,combat_session_id,current_round').eq('id',1).single();
  if(data?.combat_active&&data?.combat_session_id){
    const{data:sess}=await db.from('combat_sessions').select('*').eq('id',data.combat_session_id).single();
    combatSessionData=sess;
    // Load my participant row
    const{data:part}=await db.from('combat_participants').select('*').eq('session_id',data.combat_session_id).eq('participant_id',CHAR_ID).single();
    combatParticipantData=part||null;
    showCombatOverlay();
  } else {
    hideCombatOverlay();
  }
}
function showCombatOverlay(){
  document.getElementById('combat-overlay').classList.add('vis');
  document.body.style.overflow='hidden';
  updateCombatOverlay();
}
function hideCombatOverlay(){
  document.getElementById('combat-overlay').classList.remove('vis');
  document.body.style.overflow='';
  combatSessionData=null;combatParticipantData=null;myQueueItem=null;
}
function updateCombatOverlay(){
  if(!combatSessionData) return;
  // Round
  document.getElementById('co-round-text').textContent=`Round ${combatSessionData.round||1}`;
  // Harm
  const harm=getTotalHarm();const mort=getMortality();
  document.getElementById('co-harm-nums').textContent=`${harm} / ${mort}`;
  document.getElementById('co-harm-fill').style.width=`${Math.min(100,harm/(mort||1)*100)}%`;
  // Conditions
  const condsEl=document.getElementById('co-conditions');
  if(condsEl) condsEl.innerHTML=conditions.map(c=>`<span style="display:inline-flex;align-items:center;gap:4px;padding:2px 8px;background:var(--surf2);border:1px solid var(--border);border-radius:10px;font-size:11px;margin:2px;color:${c.unstable?'var(--unstable)':'var(--text)'}">${c.label} ${c.harm}</span>`).join('');
  // Action pips
  const pipsEl=document.getElementById('co-action-pips');
  if(pipsEl&&combatParticipantData){
    pipsEl.innerHTML='';
    for(let i=1;i<=combatParticipantData.actions_max;i++){
      const used=i<=combatParticipantData.actions_used;
      const pip=document.createElement('div');
      pip.className=`co-apip ${used?'used':'avail'}`;
      pip.textContent=used?'✓':'◆';
      pipsEl.appendChild(pip);
    }
  }
  // Tracks
  ['wisdom','grit','bond'].forEach(t=>{
    const el=document.getElementById(`co-${t}-pips`);if(!el)return;
    el.innerHTML='';
    for(let i=1;i<=4;i++){const pip=document.createElement('div');pip.className=`co-pip${i<=(charData[t]||0)?' on '+t:''}`;el.appendChild(pip);}
  });
  // Weapon
  const wpnEl=document.getElementById('co-weapon-display');
  if(wpnEl){
    const weapons=inventoryData.filter(i=>i.is_weapon);
    if(weapons.length){
      const w=weapons[0];const harmTag=(w.tags||[]).find(t=>t.includes('Harm'))||'';
      wpnEl.innerHTML=`<div class="co-weapon-display"><span class="co-weapon-name">${w.name}</span><span class="co-weapon-harm">${harmTag}</span></div>`;
    } else wpnEl.innerHTML='<div style="color:var(--dim);font-size:12px;font-style:italic">No weapon equipped.</div>';
  }
  // Inventory
  const invEl=document.getElementById('co-inventory');
  if(invEl){
    if(!inventoryData.length){invEl.innerHTML='<div style="color:var(--dim);font-size:12px;font-style:italic">No items.</div>';return;}
    invEl.innerHTML='';
    inventoryData.forEach(item=>{
      const div=document.createElement('div');div.className='co-inv-item';
      const canUse=item.uses_max>0||item.healing_value;
      div.innerHTML=`<span style="flex:1;font-size:12px">${item.name}</span>
        ${item.uses_max>0?`<span style="font-size:11px;color:var(--dim)">${item.uses_current}/${item.uses_max}</span>`:''}
        ${canUse?`<button class="co-inv-use" onclick="useItem('${item.id}')">Use</button>`:''}`;
      invEl.appendChild(div);
    });
  }
  // Turn indicator
  const isMyTurn=combatSessionData.current_turn_id===CHAR_ID&&combatSessionData.current_turn_type==='pc';
  document.getElementById('co-turn-text').textContent=isMyTurn?'▶ YOUR TURN':'';
  const actionPanel=document.getElementById('co-action-panel');
  if(actionPanel) actionPanel.style.display=isMyTurn?'block':'none';
  if(isMyTurn) buildCombatActionGrid();
  // Queue
  renderCombatQueue();
  // Join button
  const joinBtn=document.getElementById('co-join-btn');
  if(joinBtn){
    const inQueue=combatQueueData.some(q=>q.character_id===CHAR_ID&&q.status!=='done');
    const noActions=combatParticipantData&&combatParticipantData.actions_used>=combatParticipantData.actions_max;
    joinBtn.disabled=inQueue||noActions||isMyTurn;
    joinBtn.textContent=inQueue?'⏳ In Queue — Waiting...':noActions?'No Actions Left':'⚔ I Want to Act';
  }
}
async function joinCombatQueue(){
  if(!combatSessionData)return;
  const{data}=await db.from('combat_queue').insert({session_id:combatSessionData.id,character_id:CHAR_ID,status:'waiting',position:combatQueueData.length+1}).select().single();
  if(data){myQueueItem=data;combatQueueData.push(data);}
  updateCombatOverlay();showToast('Added to queue — waiting for your turn');
}
function renderCombatQueue(){
  const list=document.getElementById('co-queue-list');if(!list)return;
  const active=combatQueueData.filter(q=>q.status!=='done');
  if(!active.length){list.innerHTML='<div style="color:var(--dim);font-size:12px;font-style:italic">No one in queue.</div>';return;}
  list.innerHTML='';
  active.forEach((q,i)=>{
    const isMe=q.character_id===CHAR_ID;
    const div=document.createElement('div');
    div.className=`co-queue-item${isMe?' my-turn':''}${q.status==='active'?' active':''}`;
    div.innerHTML=`<span style="font-family:'Cinzel',serif;font-size:11px;font-weight:700;color:var(--lewis-acc)">#${i+1}</span><span style="font-size:13px;color:${isMe?'var(--gold)':'var(--text)'}">${q.character_id}${isMe?' (you)':''}</span>`;
    list.appendChild(div);
  });
}
function buildCombatActionGrid(){
  const grid=document.getElementById('co-action-grid');if(!grid)return;
  const featsUnlocked=[...unlockedFeats];
  const actions=[
    {icon:'⚔',label:'Attack',desc:'Roll weapon damage',cost:'',onclick:'submitCombatAction("attack","Attack with weapon")'},
    {icon:'🎲',label:'Skill Roll',desc:'Roll any skill',cost:'',onclick:'submitCombatAction("skill","Skill roll")'},
    {icon:'🏃',label:'Move',desc:'Reposition on the field',cost:'',onclick:'submitCombatAction("move","Move")'},
    {icon:'🔍',label:'Scope',desc:'Investigate surroundings',cost:'',onclick:'submitCombatAction("scope","Scope")'},
    {icon:'🎒',label:'Use Item',desc:'Use an item from inventory',cost:'',onclick:'submitCombatAction("item","Use item")'},
  ];
  // Add unlocked feats
  FEATS.filter(f=>featsUnlocked.has(f.id)).forEach(f=>{
    actions.push({icon:f.type==='combat'?'⚔':'🛡',label:f.name,desc:f.desc,cost:'1 Grit',onclick:`submitCombatAction("feat","${f.name}")`});
  });
  grid.innerHTML='';
  actions.forEach(a=>{
    const btn=document.createElement('button');btn.className='co-action-btn';
    btn.innerHTML=`<span class="co-action-icon">${a.icon}</span>${a.label}<span class="co-action-cost">${a.cost}</span>`;
    btn.onclick=()=>{ eval(a.onclick); };
    grid.appendChild(btn);
  });
}
async function submitCombatAction(type,label){
  if(!combatSessionData)return;
  // Deduct Grit for feats
  if(type==='feat'){
    const grit=charData.grit||0;
    if(grit<=0){showToast('Not enough Grit');return;}
    const newGrit=grit-1;charData.grit=newGrit;buildStatPips();
    await db.from('characters').update({grit:newGrit,updated_at:new Date().toISOString()}).eq('id',CHAR_ID);
    await logMomentumChange('grit',grit,newGrit,`Grit spent for feat: ${label}`);
  }
  // Submit action to DB — DM sees it and narrates
  await db.from('combat_actions').insert({
    session_id:combatSessionData.id,actor_id:CHAR_ID,actor_type:'pc',actor_name:CHAR_ID,
    action_type:type,action_label:label,resolved:false
  });
  document.getElementById('co-action-panel').style.display='none';
  showToast(`Action submitted: ${label}`);
  // Mark queue item active
  if(myQueueItem){await db.from('combat_queue').update({status:'active',updated_at:new Date().toISOString()}).eq('id',myQueueItem.id);}
}

// ── ITEM USE ──
async function useItem(itemId){
  const item=inventoryData.find(i=>i.id===itemId);if(!item)return;
  showStyledConfirm(
    `Use "${item.name}"?`,
    item.healing_value ? `This will heal a condition using ${item.healing_value}. This use is permanent.` : `This will consume one use. This is permanent.`,
    async()=>{
      if(item.healing_value){await useHealingItem(item);}
      else if(item.uses_max>0){await decrementItem(item);}
    }
  );
}
async function useHealingItem(item){
  if(!conditions.length){showToast('No conditions to heal');return;}
  // Show condition picker
  const modal=document.getElementById('roll-modal');
  const content=document.getElementById('roll-modal-content');
  const condHtml=conditions.map(c=>`<button onclick="applyHealing('${item.id}','${c.id}','${item.healing_value}')" style="display:block;width:100%;padding:8px 12px;margin-bottom:6px;background:var(--surf2);border:1px solid var(--border);border-radius:4px;color:var(--text);cursor:pointer;text-align:left;font-size:13px;transition:all .18s" onmouseover="this.style.borderColor='var(--success)'" onmouseout="this.style.borderColor='var(--border)'">${c.label} — ${c.harm} harm</button>`).join('');
  content.innerHTML=`
    <div style="font-family:'Cinzel',serif;font-size:11px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--success);margin-bottom:10px">Apply ${item.healing_value} Healing</div>
    <div style="font-size:13px;color:var(--muted);margin-bottom:12px">Which condition are you healing?</div>
    ${condHtml}
    <button class="add-cond-btn" style="margin-top:8px" onclick="closeRollModal()">Cancel</button>`;
  modal.classList.add('vis');
}
async function applyHealing(itemId,condId,healVal){
  const item=inventoryData.find(i=>i.id===itemId);
  const cond=conditions.find(c=>c.id===condId);
  if(!item||!cond)return;
  // Parse healing value
  const healAmt=rollDieStr(healVal);
  const newHarm=Math.max(0,cond.harm-healAmt);
  if(newHarm<=0){
    // Remove condition entirely
    await db.from('conditions').delete().eq('id',condId);
    conditions=conditions.filter(c=>c.id!==condId);
    showToast(`${cond.label} healed — removed (${healAmt} healing)`);
  } else {
    await db.from('conditions').update({harm:newHarm,updated_at:new Date().toISOString()}).eq('id',condId);
    cond.harm=newHarm;
    showToast(`${healAmt} healing applied to ${cond.label}`);
  }
  renderConditions();
  await decrementItem(item);
  closeRollModal();
}
function rollDieStr(s){
  if(!s)return 0;const f=parseInt(s);if(!isNaN(f)&&!String(s).includes('d'))return f;
  const m=String(s).match(/(\d+)d(\d+)/i);if(!m)return 0;
  let t=0;for(let i=0;i<parseInt(m[1]);i++)t+=Math.ceil(Math.random()*parseInt(m[2]));return t;
}
async function decrementItem(item){
  if(item.uses_max>0){
    const newUses=Math.max(0,item.uses_current-1);
    await db.from('equipment').update({uses_current:newUses,updated_at:new Date().toISOString()}).eq('id',item.id);
    item.uses_current=newUses;
    if(newUses<=0){showToast(`${item.name} used up`);inventoryData=inventoryData.filter(i=>i.id!==item.id);}
    renderInventory();
  }
}

// ── REST & UNDO NOTIFICATIONS ──
function subscribeNotifications(){
  db.channel(`${CHAR_ID}-rest`).on('postgres_changes',{event:'INSERT',schema:'public',table:'rest_events'},async(payload)=>{
    const ev=payload.new;if(!ev)return;
    const initiator=ev.initiated_by||'';
    if(initiator.startsWith(`undo_${CHAR_ID}_`)){
      // This is an undo notification for me
      const changeType=initiator.replace(`undo_${CHAR_ID}_`,'');
      showUndoNotification(changeType);
    } else if(ev.rest_type==='short'||ev.rest_type==='long'){
      showRestPopup(ev.rest_type);
      // Reload character data to get updated favor
      await loadCharacter();
      buildFavorTokens();
      if(ev.rest_type==='long'){await loadConditions();renderConditions();}
    }
  }).subscribe();
  // Combat session changes
  db.channel(CHAR_ID+'-dm-settings').on('postgres_changes',{event:'UPDATE',schema:'public',table:'dm_settings'},async(payload)=>{
    if(payload.new?.combat_active&&payload.new?.combat_session_id){
      const{data:sess}=await db.from('combat_sessions').select('*').eq('id',payload.new.combat_session_id).single();
      combatSessionData=sess;
      const{data:part}=await db.from('combat_participants').select('*').eq('session_id',payload.new.combat_session_id).eq('participant_id',CHAR_ID).single();
      combatParticipantData=part||null;
      showCombatOverlay();
    } else if(!payload.new?.combat_active){
      hideCombatOverlay();
    }
  }).subscribe();
  // Combat session updates (round changes, turn changes)
  db.channel(`${CHAR_ID}-combat-sess`).on('postgres_changes',{event:'UPDATE',schema:'public',table:'combat_sessions'},async(payload)=>{
    if(combatSessionData&&payload.new?.id===combatSessionData.id){
      combatSessionData=payload.new;updateCombatOverlay();
    }
  }).subscribe();
  // My participant row
  db.channel(`${CHAR_ID}-combat-part`).on('postgres_changes',{event:'UPDATE',schema:'public',table:'combat_participants',filter:`participant_id=eq.${CHAR_ID}`},async(payload)=>{
    combatParticipantData=payload.new;updateCombatOverlay();
  }).subscribe();
  // Combat queue
  db.channel(`${CHAR_ID}-combat-q`).on('postgres_changes',{event:'*',schema:'public',table:'combat_queue'},async(payload)=>{
    if(!combatSessionData)return;
    const{data}=await db.from('combat_queue').select('*').eq('session_id',combatSessionData.id).in('status',['waiting','active']).order('created_at');
    combatQueueData=data||[];
    myQueueItem=combatQueueData.find(q=>q.character_id===CHAR_ID)||null;
    renderCombatQueue();updateCombatOverlay();
  }).subscribe();
  // Advancement — pending_advances field
  db.channel(`${CHAR_ID}-advance-check`).on('postgres_changes',{event:'UPDATE',schema:'public',table:'characters',filter:`id=eq.${CHAR_ID}`},async(payload)=>{
    const pending=payload.new?.pending_advances||0;
    if(pending>0) showAdvanceModal();
  }).subscribe();
}

// ── JURY OVERLAY ──
async function updateJuryOverlay(){
  const{data:sess}=await db.from('jury_sessions').select('*').in('status',['open','voting']).order('created_at',{ascending:false}).limit(1);
  const overlay=document.getElementById('jury-overlay');if(!overlay)return;
  if(!sess||sess.length===0){overlay.style.display='none';return;}
  const session=sess[0];
  if(session.status==='complete'){overlay.style.display='none';return;}
  // Get active queue item
  const{data:active}=await db.from('jury_queue').select('*').eq('session_id',session.id).eq('status','active').limit(1);
  if(!active||!active.length){
    // Session open but nothing active yet
    document.getElementById('jury-ov-text').textContent='The Weaver is opening the session...';
    document.getElementById('jury-ov-btns').innerHTML='';
    overlay.style.display='flex';
    return;
  }
  const item=active[0];
  const isMyItem=item.character_id===CHAR_ID;
  document.getElementById('jury-ov-text').textContent=(isMyItem?'Your ':'')+(item.character_id===CHAR_ID?'':''+item.character_id+'\'s ')+item.item_type+': "'+item.item_text+'"';
  // Check if already voted
  const{data:myVote}=await db.from('jury_votes').select('*').eq('queue_item_id',item.id).eq('voter_id',CHAR_ID).limit(1);
  const voted=myVote&&myVote.length>0;
  const{data:allVotes}=await db.from('jury_votes').select('*').eq('queue_item_id',item.id);
  const yc=(allVotes||[]).filter(v=>v.vote).length;
  const nc=(allVotes||[]).filter(v=>!v.vote).length;
  document.getElementById('jury-ov-tally').textContent=(allVotes?.length||0)+'/4 voted · '+yc+'Y '+nc+'N';
  const btnsEl=document.getElementById('jury-ov-btns');
  if(isMyItem){
    btnsEl.innerHTML='<div style="font-size:13px;color:var(--muted);font-style:italic">You are arguing for this item — wait for others to vote.</div>';
  } else if(voted){
    btnsEl.innerHTML='<div style="font-size:13px;color:var(--success)">✓ Vote recorded — waiting for others.</div>';
  } else {
    btnsEl.innerHTML='<button onclick="castJuryVote(\''+item.id+'\',true)" style="padding:10px 24px;border-radius:6px;border:1px solid var(--success);background:transparent;color:var(--success);font-family:'Cinzel',serif;font-size:12px;font-weight:700;letter-spacing:2px;cursor:pointer;transition:all .18s" onmouseover="this.style.background='#22c55e20'" onmouseout="this.style.background='transparent'">✓ Yes</button>'
      +'<button onclick="castJuryVote(\''+item.id+'\',false)" style="padding:10px 24px;border-radius:6px;border:1px solid var(--fail);background:transparent;color:var(--fail);font-family:'Cinzel',serif;font-size:12px;font-weight:700;letter-spacing:2px;cursor:pointer;transition:all .18s" onmouseover="this.style.background='#ef444420'" onmouseout="this.style.background='transparent'">✕ No</button>';
  }
  overlay.style.display='flex';
}
async function castJuryVote(queueItemId,vote){
  const{error}=await db.from('jury_votes').insert({queue_item_id:queueItemId,voter_id:CHAR_ID,vote});
  if(error){showToast('Vote error: '+error.message);return;}
  showToast(vote?'Voted Yes':'Voted No');
  await updateJuryOverlay();
}
// ── BOOT ──
init().catch(e=>{console.error(e);setSyncDot(false);});
</script>
</body>
