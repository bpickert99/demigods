<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Demigods — Campaign Hub · v3.2</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Cinzel+Decorative:wght@700&family=Inter:wght@400;500&family=Crimson+Pro:ital@0;1&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#07070e;--surf:#0e0e1c;--border:#252540;
  --text:#e8e0d0;--muted:#9090b0;--dim:#606080;--gold:#d4a84b;--gold2:#d4a84b22;
  --lewis:#7c3aed;--murphy:#10b981;--kara:#f59e0b;--finn:#8b5cf6;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
#bg-canvas{position:fixed;inset:0;pointer-events:none;z-index:0;opacity:.35}
.wrap{position:relative;z-index:2;width:100%;max-width:700px;text-align:center}
.campaign-title{font-family:'Cinzel Decorative',serif;font-size:clamp(28px,6vw,52px);color:var(--text);letter-spacing:4px;margin-bottom:8px}
.campaign-sub{font-family:'Crimson Pro',serif;font-size:clamp(14px,2.5vw,20px);color:var(--muted);font-style:italic;margin-bottom:48px;letter-spacing:2px}
.divider{height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin-bottom:48px}
.section-label{font-family:'Cinzel',serif;font-size:10px;font-weight:700;letter-spacing:6px;text-transform:uppercase;color:var(--dim);margin-bottom:20px}

/* player cards */
.players-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;margin-bottom:40px}
@media(min-width:500px){.players-grid{grid-template-columns:repeat(4,1fr)}}
.player-card{display:flex;flex-direction:column;align-items:center;gap:10px;padding:20px 14px;background:var(--surf);border:1px solid var(--border);border-radius:10px;text-decoration:none;transition:all .25s;position:relative;overflow:hidden}
.player-card::before{content:'';position:absolute;inset:0;background:var(--pc,transparent);opacity:0;transition:opacity .25s}
.player-card:hover::before{opacity:.06}
.player-card:hover{border-color:var(--pc,var(--border));transform:translateY(-3px);box-shadow:0 8px 24px var(--ps,transparent)}
.player-emoji{font-size:36px;filter:drop-shadow(0 0 8px var(--pc,transparent))}
.player-name{font-family:'Cinzel Decorative',serif;font-size:14px;color:var(--text)}
.player-playbook{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-top:2px}

/* dm card */
.dm-card{display:flex;align-items:center;gap:16px;padding:18px 24px;background:var(--surf);border:1px solid var(--gold);border-radius:10px;text-decoration:none;transition:all .25s;margin-bottom:40px}
.dm-card:hover{background:var(--gold2);transform:translateY(-2px);box-shadow:0 8px 24px var(--gold2)}
.dm-icon{font-size:32px}
.dm-info{text-align:left;flex:1}
.dm-title{font-family:'Cinzel Decorative',serif;font-size:16px;color:var(--gold)}
.dm-sub{font-size:12px;color:var(--muted);margin-top:3px;letter-spacing:1px}
.dm-arrow{font-size:24px;color:var(--gold);opacity:.6}

footer{margin-top:24px;font-family:'Cinzel',serif;font-size:9px;font-weight:700;letter-spacing:4px;color:var(--dim)}
</style>
</head>
<body>
<canvas id="bg-canvas"></canvas>
<div class="wrap">
  <div class="campaign-title">Demigods</div>
  <div style="font-family:\'Cinzel\',serif;font-size:9px;font-weight:700;letter-spacing:3px;color:var(--dim);opacity:.5;margin-top:4px">v3.1</div>
  <div class="divider"></div>

  <div class="section-label">Player Screens</div>
  <div class="players-grid">
    <a href="lewis.html" class="player-card" style="--pc:var(--lewis);--ps:#7c3aed33">
      <div class="player-emoji">🐦‍⬛</div>
      <div>
        <div class="player-name">Lewis</div>
        <div class="player-playbook" style="color:var(--lewis)">Child of the Morrigan</div>
      </div>
    </a>
    <a href="murphy.html" class="player-card" style="--pc:var(--murphy);--ps:#10b98133">
      <div class="player-emoji">🔥</div>
      <div>
        <div class="player-name">Murphy</div>
        <div class="player-playbook" style="color:var(--murphy)">Child of Brigid</div>
      </div>
    </a>
    <a href="kara.html" class="player-card" style="--pc:var(--kara);--ps:#f59e0b33">
      <div class="player-emoji">⚙️</div>
      <div>
        <div class="player-name">Kara</div>
        <div class="player-playbook" style="color:var(--kara)">Child of Goibniu</div>
      </div>
    </a>
    <a href="finn.html" class="player-card" style="--pc:var(--finn);--ps:#8b5cf633">
      <div class="player-emoji">🐺</div>
      <div>
        <div class="player-name">Finn</div>
        <div class="player-playbook" style="color:var(--finn)">Púca</div>
      </div>
    </a>
  </div>

  <div class="section-label">Weaver</div>
  <a href="dm.html" class="dm-card" id="dm-link" style="display:none">
    <div class="dm-icon">📖</div>
    <div class="dm-info">
      <div class="dm-title">Weaver Screen</div>
      <div class="dm-sub">Initiative · Party Overview · NPC Tracker · Rolls · Jury</div>
    </div>
    <div class="dm-arrow">→</div>
  </a>
  <div id="dm-locked" style="display:flex;align-items:center;gap:16px;padding:18px 24px;background:var(--surf);border:1px solid var(--border);border-radius:10px;margin-bottom:40px">
    <div style="font-size:32px">🔒</div>
    <div style="flex:1">
      <div style="font-family:'Cinzel Decorative',serif;font-size:16px;color:var(--dim)">Weaver Screen</div>
      <div style="font-size:12px;color:var(--dim);margin-top:3px;letter-spacing:1px">Enter password to access</div>
    </div>
    <div style="display:flex;gap:8px;align-items:center">
      <input id="dm-password" type="password" placeholder="Password" style="padding:8px 12px;border-radius:4px;border:1px solid var(--border2);background:var(--surf2);color:var(--text);font-size:14px;width:130px" onkeydown="if(event.key==='Enter')checkDMPassword()">
      <button onclick="checkDMPassword()" style="padding:8px 14px;border-radius:4px;border:1px solid var(--gold);background:transparent;color:var(--gold);font-family:'Cinzel',serif;font-size:10px;font-weight:700;letter-spacing:2px;cursor:pointer;transition:all .18s" onmouseover="this.style.background='rgba(212,168,75,.2)'" onmouseout="this.style.background='transparent'">Enter</button>
    </div>
  </div>

  <footer>DEMIGODS CAMPAIGN · FORGED IN THE DARK</footer>
</div>

<script>
function checkDMPassword(){
  const input=document.getElementById('dm-password');
  if(input?.value==='1128'){
    document.getElementById('dm-locked').style.display='none';
    document.getElementById('dm-link').style.display='flex';
    window.location.href='dm.html';
  } else {
    input.style.borderColor='#ef4444';
    input.value='';
    input.placeholder='Incorrect';
    setTimeout(()=>{input.style.borderColor='';input.placeholder='Password';},1500);
  }
}

// Ambient particle canvas
const canvas=document.getElementById('bg-canvas');
const ctx=canvas.getContext('2d');
let particles=[];
const COLORS=['124,58,237','16,185,129','245,158,11','139,92,246'];
function resize(){canvas.width=window.innerWidth;canvas.height=window.innerHeight;}
function init(){
  particles=[];
  for(let i=0;i<60;i++){
    particles.push({
      x:Math.random()*canvas.width,y:Math.random()*canvas.height,
      r:Math.random()*1.4+.3,vx:(Math.random()-.5)*.09,vy:(Math.random()-.5)*.09,
      a:Math.random()*.3+.06,c:COLORS[Math.floor(Math.random()*COLORS.length)]
    });
  }
}
function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  const g=ctx.createRadialGradient(canvas.width/2,canvas.height/2,0,canvas.width/2,canvas.height/2,canvas.width*.7);
  g.addColorStop(0,'rgba(212,168,75,.04)');g.addColorStop(1,'transparent');
  ctx.fillStyle=g;ctx.fillRect(0,0,canvas.width,canvas.height);
  particles.forEach(p=>{
    p.x+=p.vx;p.y+=p.vy;
    if(p.x<0)p.x=canvas.width;if(p.x>canvas.width)p.x=0;
    if(p.y<0)p.y=canvas.height;if(p.y>canvas.height)p.y=0;
    ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fillStyle=`rgba(${p.c},${p.a*.5})`;ctx.fill();
  });
  requestAnimationFrame(draw);
}
resize();init();draw();
window.addEventListener('resize',()=>{resize();init();});
</script>
</body>
</html>
