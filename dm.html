<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Paragon — Weaver</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cinzel+Decorative:wght@700&family=Crimson+Pro:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"><\/script>
<style>
:root{
  --bg:#ede6d6;--surf:#faf6ee;--surf2:#f0e9d8;--surf3:#e8dfc8;
  --bor:#d4c8a8;--bor2:#c0b08c;
  --text:#1a1208;--muted:#6b5530;--dim:#a0926a;
  --acc:#4a1e8c;--acc-l:#6b3ab8;--acc-d:#f0e8ff;
  --acc-rgb:74,30,140;
  --harm:#9b1c1c;--harm-bg:#fef2f2;
  --warn:#92400e;--warn-bg:#fffbeb;
  --ok:#14532d;--ok-bg:#f0fdf4;
  --info:#1e3a8a;--info-bg:#eff6ff;
  --r:6px;--font-body:'Crimson Pro',Georgia,serif;--font-head:'Cinzel',serif;--font-deco:'Cinzel Decorative',serif
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:15px}
body{background:var(--bg);color:var(--text);font-family:var(--font-body);min-height:100vh;overflow-x:hidden;line-height:1.5}

/* ── PASSWORD ── */
.pw-screen{position:fixed;inset:0;background:var(--bg);z-index:900;display:flex;align-items:center;justify-content:center}
.pw-box{background:var(--surf);border:2px solid var(--bor2);border-radius:12px;padding:36px;width:340px;text-align:center;box-shadow:0 4px 24px rgba(0,0,0,.12)}
.pw-ttl{font-family:var(--font-deco);font-size:22px;color:var(--acc);margin-bottom:4px}
.pw-sub{font-family:var(--font-head);font-size:9px;font-weight:700;letter-spacing:4px;text-transform:uppercase;color:var(--muted);margin-bottom:24px}
.pw-in{width:100%;padding:11px 16px;background:white;border:1px solid var(--bor2);border-radius:6px;color:var(--text);font-family:var(--font-body);font-size:16px;text-align:center;outline:none;margin-bottom:12px}
.pw-in:focus{border-color:var(--acc);box-shadow:0 0 0 2px rgba(74,30,140,.15)}
.pw-btn{width:100%;padding:11px;background:var(--acc);border:none;border-radius:6px;font-family:var(--font-head);font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:white;cursor:pointer;transition:background .2s}
.pw-btn:hover{background:var(--acc-l)}
.pw-err{color:var(--harm);font-family:var(--font-head);font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-top:10px}

/* ── APP SHELL ── */
.layout{display:grid;grid-template-rows:auto 1fr;height:100vh}
.hdr{padding:12px 20px;background:var(--surf);border-bottom:2px solid var(--bor2);display:flex;align-items:center;gap:14px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.hdr-ttl{font-family:var(--font-deco);font-size:18px;color:var(--acc)}
.hdr-sub{font-family:var(--font-head);font-size:9px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--muted)}
.sync{width:8px;height:8px;border-radius:50%;margin-left:auto;transition:all .3s;flex-shrink:0}
.sync{background:var(--ok);box-shadow:0 0 5px rgba(20,83,45,.4)}
.sync.saving{background:var(--warn);box-shadow:0 0 5px rgba(146,64,14,.4)}
.sync.err{background:var(--harm);box-shadow:0 0 5px rgba(155,28,28,.4)}
.main{display:grid;grid-template-columns:200px 1fr;overflow:hidden}
.sidebar{background:var(--surf2);border-right:2px solid var(--bor);overflow-y:auto}
.sb-item{display:flex;align-items:center;gap:10px;padding:11px 16px;cursor:pointer;border-bottom:1px solid var(--bor);font-family:var(--font-head);font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);transition:all .2s}
.sb-item:hover{background:var(--surf3);color:var(--text)}
.sb-item.on{background:var(--acc-d);color:var(--acc);border-right:3px solid var(--acc)}
.content{overflow-y:auto;background:var(--bg)}
.tab-pane{display:none;padding:20px}.tab-pane.on{display:block}

/* ── SHARED ── */
.section-label{font-family:var(--font-head);font-size:10px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--muted);margin-bottom:10px;display:flex;align-items:center;gap:8px}
.section-label-bar{height:1px;flex:1;background:var(--bor)}
.divider{height:1px;background:var(--bor);margin:16px 0}
.btn{display:inline-flex;align-items:center;justify-content:center;padding:7px 14px;border-radius:5px;font-family:var(--font-head);font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;cursor:pointer;border:1px solid;transition:all .2s;white-space:nowrap;gap:4px}
.btn-acc{background:var(--acc);border-color:var(--acc-l);color:white}.btn-acc:hover{background:var(--acc-l)}
.btn-harm{background:var(--harm-bg);border-color:var(--harm);color:var(--harm)}.btn-harm:hover{background:#fee2e2}
.btn-ghost{background:white;border-color:var(--bor2);color:var(--muted)}.btn-ghost:hover{border-color:var(--text);color:var(--text)}
.btn-ok{background:var(--ok-bg);border-color:var(--ok);color:var(--ok)}.btn-ok:hover{background:#dcfce7}
.card{background:var(--surf);border:1px solid var(--bor2);border-radius:var(--r)}
.empty{font-family:var(--font-head);font-size:10px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--dim);text-align:center;padding:20px}
.ai{padding:8px 12px;background:white;border:1px solid var(--bor2);border-radius:5px;color:var(--text);font-family:var(--font-body);font-size:15px;outline:none;transition:border-color .2s}
.ai:focus{border-color:var(--acc);box-shadow:0 0 0 2px rgba(74,30,140,.1)}
select.ai{cursor:pointer}

/* ── CHAR CARDS ── */
.char-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:14px}
.char-card{background:var(--surf);border:1px solid var(--bor2);border-radius:var(--r);overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.char-card-hdr{display:flex;align-items:center;gap:12px;padding:12px 14px;border-bottom:1px solid var(--bor);background:var(--surf2)}
.char-ava{font-size:28px}
.char-name{font-family:var(--font-head);font-size:14px;font-weight:700;color:var(--acc);letter-spacing:.5px}
.char-sub{font-family:var(--font-head);font-size:9px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-top:2px}
.char-body{padding:12px 14px;display:flex;flex-direction:column;gap:10px}
.stat-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.stat-lbl{font-family:var(--font-head);font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);white-space:nowrap}
.pips{display:flex;gap:3px}
.pip{width:15px;height:15px;border-radius:2px;border:1px solid var(--bor2);background:var(--surf2)}
.pip.on{background:var(--acc);border-color:var(--acc-l)}
.pip.ok{background:var(--ok)!important;border-color:#16a34a!important}
.pip.warn{background:var(--warn)!important;border-color:#d97706!important}
.pip.harm{background:var(--harm)!important;border-color:#dc2626!important}
.cond-list{display:flex;flex-wrap:wrap;gap:5px}
.cond-pill{display:flex;align-items:center;gap:4px;background:var(--harm-bg);border:1px solid #fca5a5;border-radius:10px;padding:3px 8px;font-size:13px;color:var(--text)}
.cond-pill .h{font-family:var(--font-head);font-size:10px;font-weight:700;color:var(--harm)}
.pull-track{display:flex;gap:2px}
.pull-step{width:24px;height:24px;border-radius:3px;border:1px solid var(--bor2);background:var(--surf2);font-family:var(--font-head);font-size:9px;font-weight:700;color:var(--muted);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s}
.pull-step.active{background:var(--acc);border-color:var(--acc-l);color:white}
.harm-display{font-family:var(--font-head);font-size:16px;font-weight:700}
.harm-display .h{color:var(--harm)}.harm-display .lim{color:var(--muted)}
.tag{font-family:var(--font-head);font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;border-radius:5px;padding:2px 7px;border:1px solid}
.tag.ok{border-color:var(--ok);color:var(--ok);background:var(--ok-bg)}
.tag.warn{border-color:var(--warn);color:var(--warn);background:var(--warn-bg)}
.tag.harm{border-color:var(--harm);color:var(--harm);background:var(--harm-bg)}
.tag.info{border-color:var(--info);color:var(--info);background:var(--info-bg)}
.card-actions{padding:10px 14px;border-top:1px solid var(--bor);display:flex;gap:6px;flex-wrap:wrap;background:var(--surf2)}

/* ── JURY ── */
.jury-box{background:var(--info-bg);border:1px solid #bfdbfe;border-radius:var(--r);padding:16px;margin-bottom:16px}
.jury-ttl{font-family:var(--font-deco);font-size:16px;color:var(--info);margin-bottom:14px}
.jury-item{display:flex;align-items:center;gap:10px;padding:10px 12px;background:white;border:1px solid var(--bor);border-radius:5px;margin-bottom:6px}
.jury-item.active{border-color:#93c5fd;background:var(--info-bg)}
.jury-item-txt{flex:1;font-size:15px;color:var(--text)}
.jury-item-type{font-family:var(--font-head);font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);white-space:nowrap}
.vote-bar{display:flex;gap:4px;margin-top:8px}
.vote-seg{flex:1;padding:5px 4px;display:flex;align-items:center;justify-content:center;font-family:var(--font-head);font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;border-radius:3px;border:1px solid}
.vote-seg.yes{background:var(--ok-bg);color:var(--ok);border-color:#86efac}
.vote-seg.no{background:white;color:var(--muted);border-color:var(--bor)}
.vote-seg.pend{background:var(--surf2);color:var(--dim);border-color:var(--bor)}

/* ── NPCs ── */
.npc-item{background:white;border:1px solid var(--bor2);border-radius:var(--r);padding:10px 14px;margin-bottom:8px}
.npc-top{display:flex;align-items:center;gap:10px}
.npc-name{font-family:var(--font-head);font-size:13px;font-weight:700;color:var(--text);flex:1;letter-spacing:.5px}
.npc-notes{font-size:14px;color:var(--muted);margin-top:6px;padding-top:6px;border-top:1px solid var(--bor);line-height:1.5}
.npc-harm{font-family:var(--font-head);font-size:12px;font-weight:700;color:var(--harm)}

/* ── MOVES EDITOR ── */
.moves-layout{display:grid;grid-template-columns:240px 1fr;min-height:calc(100vh - 84px)}
.tree-panel{background:var(--surf2);border-right:2px solid var(--bor);overflow-y:auto;padding:6px 0}
.tree-node{padding:6px 14px 6px 28px;cursor:pointer;font-family:var(--font-head);font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);display:flex;align-items:center;gap:6px;user-select:none;transition:all .15s}
.tree-node:hover{background:var(--surf3);color:var(--text)}
.tree-node.on{background:var(--acc-d);color:var(--acc);border-right:3px solid var(--acc)}
.tree-node.section{padding-left:12px;font-size:9px;letter-spacing:2px;color:var(--text);cursor:default;background:var(--surf3);border-bottom:1px solid var(--bor);margin-top:4px;font-weight:700}
.tree-node.section:hover{background:var(--surf3);color:var(--text)}
.tree-node.child{padding-left:36px}
.tree-node.grandchild{padding-left:50px;font-size:9px}
.tree-caret{font-size:9px;flex-shrink:0}
.tree-count{font-family:var(--font-head);font-size:9px;color:var(--dim);margin-left:auto;background:var(--surf3);border-radius:10px;padding:1px 6px;border:1px solid var(--bor)}
.editor-panel{padding:20px;overflow-y:auto;background:var(--bg)}
.move-list-item{display:flex;align-items:center;gap:10px;padding:10px 12px;background:white;border:1px solid var(--bor2);border-radius:5px;margin-bottom:6px;cursor:pointer;transition:all .2s}
.move-list-item:hover{border-color:var(--acc-l);background:var(--acc-d)}
.move-list-item.editing{border-color:var(--acc);background:var(--acc-d)}
.mli-name{font-family:var(--font-head);font-size:11px;font-weight:700;letter-spacing:.5px;color:var(--text);flex:1}
.mli-branch{font-family:var(--font-head);font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--acc)}
.mli-tier{font-family:var(--font-head);font-size:9px;color:var(--muted)}

/* ── EDIT FORM ── */
@keyframes fi{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.edit-form{background:white;border:2px solid var(--acc);border-radius:var(--r);padding:18px;margin-top:14px;animation:fi .2s ease;box-shadow:0 2px 12px rgba(74,30,140,.1)}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.fg{display:flex;flex-direction:column;gap:5px}
.fg.full{grid-column:1/-1}
.fl{font-family:var(--font-head);font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted)}
.fi{padding:8px 12px;background:white;border:1px solid var(--bor2);border-radius:5px;color:var(--text);font-family:var(--font-body);font-size:15px;outline:none;transition:border-color .2s;width:100%}
.fi:focus{border-color:var(--acc);box-shadow:0 0 0 2px rgba(74,30,140,.1)}
textarea.fi{resize:vertical;min-height:72px;line-height:1.5}
select.fi{cursor:pointer}
.out-row{display:flex;gap:8px;align-items:flex-start;margin-bottom:8px}
.out-row-num{font-family:var(--font-head);font-size:10px;font-weight:700;color:var(--muted);padding-top:10px;width:16px;flex-shrink:0;text-align:right}
.out-remove{background:none;border:none;color:var(--dim);font-size:18px;cursor:pointer;padding:0;line-height:1;padding-top:8px;transition:color .2s}
.out-remove:hover{color:var(--harm)}
.prereq-sel{display:flex;flex-direction:column;gap:6px;max-height:130px;overflow-y:auto;padding:8px;background:var(--surf2);border:1px solid var(--bor2);border-radius:5px}
.prereq-item{display:flex;align-items:center;gap:8px;font-size:14px;cursor:pointer;color:var(--text)}
.prereq-item input{accent-color:var(--acc)}

/* ── WARN MODAL ── */
.warn-modal-bg{display:none;position:fixed;inset:0;background:rgba(26,18,8,.6);z-index:800;align-items:center;justify-content:center;padding:20px}
.warn-modal-bg.on{display:flex}
.warn-modal{background:white;border:2px solid var(--warn);border-radius:10px;padding:24px;max-width:460px;width:100%;box-shadow:0 8px 32px rgba(0,0,0,.2)}
.warn-ttl{font-family:var(--font-head);font-size:13px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--warn);margin-bottom:10px}
.warn-body{font-size:15px;color:var(--text);line-height:1.6;margin-bottom:16px}
.warn-btns{display:flex;gap:10px;justify-content:flex-end}

/* ── TOAST ── */
.toast{position:fixed;bottom:20px;right:20px;background:var(--text);color:white;border-radius:6px;padding:10px 18px;font-family:var(--font-head);font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;opacity:0;transition:all .3s;z-index:1000;pointer-events:none}
.toast.on{opacity:1}

/* ── LOG ── */
.log-item{padding:9px 12px;border-bottom:1px solid var(--bor);font-size:14px;line-height:1.5}
.log-time{font-family:var(--font-head);font-size:10px;color:var(--muted);display:block;margin-bottom:2px}
.log-msg{color:var(--text)}

::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:var(--surf2)}
::-webkit-scrollbar-thumb{background:var(--bor2);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--muted)}
</style>
</head>
<body>
<div class="pw-screen" id="pw-screen">
  <div class="pw-box">
    <div class="pw-ttl">Paragon</div>
    <div class="pw-sub">Weaver Access</div>
    <input class="pw-in" id="pw-in" type="password" placeholder="Password" autocomplete="current-password">
    <button class="pw-btn" onclick="checkPw()">Enter</button>
    <div class="pw-err" id="pw-err" style="display:none">Incorrect</div>
  </div>
</div>

<div class="layout" id="app" style="display:none">
  <header class="hdr">
    <span style="font-size:22px">🌒</span>
    <div><div class="hdr-ttl">Paragon</div><div class="hdr-sub">Weaver Screen</div></div>
    <div class="sync" id="sync"></div>
  </header>
  <div class="main">
    <nav class="sidebar">
      <div class="sb-item on" data-tab="overview">🗺 Overview</div>
      <div class="sb-item" data-tab="jury">⚖ Jury</div>
      <div class="sb-item" data-tab="npcs">👥 NPCs</div>
      <div class="sb-item" data-tab="pull">⚡ Pull &amp; Harm</div>
      <div class="sb-item" data-tab="moves">📖 Moves</div>
      <div class="sb-item" data-tab="tools">🔧 Tools</div>
      <div class="sb-item" data-tab="log">📜 Log</div>
    </nav>
    <div class="content">

      <!-- OVERVIEW -->
      <div class="tab-pane on" id="tab-overview">
        <div class="char-grid" id="char-grid"></div>
      </div>

      <!-- JURY -->
      <div class="tab-pane" id="tab-jury">
        <div class="jury-box">
          <div class="jury-ttl">⚖ Jury</div>
          <div id="jury-session-info"></div>
          <div style="display:flex;gap:8px;margin-bottom:14px">
            <button class="btn btn-acc" id="jury-start-btn" onclick="juryStart()">Start Session</button>
            <button class="btn btn-ghost" id="jury-end-btn" onclick="juryEnd()" style="display:none">End Session</button>
          </div>
          <div id="jury-items-list"></div>
        </div>
        <div class="divider"></div>
        <div class="section-label">Add Item <div class="section-label-bar"></div></div>
        <div style="display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap">
          <select class="ai" id="jury-char-sel" style="flex:none;width:110px"><option value="">Character…</option></select>
          <select class="ai" id="jury-type-sel" style="flex:none;width:90px"><option value="trait">Trait</option><option value="drive">Drive</option></select>
          <input class="ai" id="jury-text-in" style="flex:1;min-width:200px" placeholder="Trait or Drive text…">
          <button class="btn btn-acc" onclick="juryAddItem()">Add</button>
        </div>
        <div id="jury-results" style="margin-top:14px"></div>
      </div>

      <!-- NPCS -->
      <div class="tab-pane" id="tab-npcs">
        <div class="section-label">Session NPCs <div class="section-label-bar"></div></div>
        <div id="npc-list"></div>
        <div style="display:flex;gap:8px;margin-top:10px;flex-wrap:wrap">
          <input class="ai" id="npc-name-in" style="flex:1;min-width:120px" placeholder="NPC name…">
          <input class="ai" id="npc-harm-in" style="width:80px" placeholder="Harm">
          <input class="ai" id="npc-notes-in" style="flex:2;min-width:160px" placeholder="Notes…">
          <button class="btn btn-acc" onclick="addNpc()">Add</button>
        </div>
        <div class="divider"></div>
        <div class="section-label">Session Notes <div class="section-label-bar"></div></div>
        <textarea class="ai" id="session-notes" style="width:100%;min-height:140px;resize:vertical" placeholder="Notes for this session…"></textarea>
        <button class="btn btn-ghost" style="margin-top:10px" onclick="saveNotes()">Save Notes</button>
        <div id="notes-saved" style="display:none;font-family:var(--font-head);font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--ok);margin-top:8px">Saved ✓</div>
      </div>

      <!-- PULL & HARM -->
      <div class="tab-pane" id="tab-pull">
        <div class="section-label">Pull Control <div class="section-label-bar"></div></div>
        <div id="pull-controls"></div>
        <div class="divider"></div>
        <div class="section-label">Apply Harm <div class="section-label-bar"></div></div>
        <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap">
          <select class="ai" id="harm-char-sel" style="width:120px"><option value="">Target…</option></select>
          <input class="ai" id="harm-name-in" style="flex:1;min-width:140px" placeholder="Condition name…">
          <input class="ai" id="harm-val-in" style="width:70px" type="number" placeholder="Harm" min="1" max="9" value="1">
          <label style="display:flex;align-items:center;gap:6px;font-size:15px;color:var(--muted);cursor:pointer;white-space:nowrap"><input type="checkbox" id="harm-unstable" style="accent-color:var(--warn)"> Unstable</label>
          <button class="btn btn-harm" onclick="applyHarm()">Apply Harm</button>
        </div>
        <div class="divider"></div>
        <div class="section-label">Markup Mode <div class="section-label-bar"></div></div>
        <div id="markup-controls"></div>
        <div class="divider"></div>
        <div class="section-label">Advancement Awards <div class="section-label-bar"></div></div>
        <div id="adv-controls"></div>
      </div>

      <!-- MOVES EDITOR -->
      <div class="tab-pane" id="tab-moves" style="padding:0">
        <div class="moves-layout">
          <div class="tree-panel" id="tree-panel"></div>
          <div class="editor-panel" id="editor-panel"><div class="empty">Select a playbook from the tree</div></div>
        </div>
      </div>

<script>
const SUPABASE_URL = 'https://hcrfqtwpraerheiuirem.supabase.co'
const SUPABASE_KEY = 'sb_publishable_C3dTYXnpaYOg1QCBgXMcBQ_V9cE4Na1'
const PW = '112899'

let db, _npcs=[], _notes='', _log=[], _juryState={active:false,session_id:null,items:[],votes:{},current_index:0}
const D={chars:{},playbooks:[],gods:[],pantheons:[],moves:[],charMoves:{},patronage:{}}

function checkPw(){
  const v=document.getElementById('pw-in').value
  if(v===PW){document.getElementById('pw-screen').style.display='none';document.getElementById('app').style.display='grid';init()}
  else{const e=document.getElementById('pw-err');e.style.display='block';setTimeout(()=>e.style.display='none',2000)}
}
document.getElementById('pw-in').addEventListener('keydown',e=>e.key==='Enter'&&checkPw())

document.querySelectorAll('.sb-item').forEach(s=>s.addEventListener('click',()=>{
  document.querySelectorAll('.sb-item').forEach(x=>x.classList.toggle('on',x===s))
  document.querySelectorAll('.tab-pane').forEach(p=>p.classList.toggle('on',p.id==='tab-'+s.dataset.tab))
  if(s.dataset.tab==='moves')renderMovesTree()
}))

async function init(){
  db=supabase.createClient(SUPABASE_URL,SUPABASE_KEY,{auth:{persistSession:false,autoRefreshToken:false,detectSessionFromUrl:false}})
  await loadAll(); subscribeRealtime(); renderAll()
  const n=localStorage.getItem('dm_notes'); if(n)document.getElementById('session-notes').value=n
  const np=localStorage.getItem('dm_npcs'); if(np){_npcs=JSON.parse(np);renderNpcs()}
  const lg=localStorage.getItem('dm_log'); if(lg){_log=JSON.parse(lg);renderLog()}
}

async function loadAll(){
  sync('saving')
  const [charsRes,pbRes,godRes,panRes,movesRes,cmRes,patRes]=await Promise.all([
    db.from('characters').select('*').in('id',['lewis','murphy','kara','finn']),
    db.from('playbooks').select('*').order('type').order('name'),
    db.from('gods').select('*'),
    db.from('pantheons').select('*'),
    db.from('moves').select('*').order('order_index'),
    db.from('character_moves').select('*'),
    db.from('character_patronage').select('*'),
  ])
  if(charsRes.error){sync('err');return}
  charsRes.data.forEach(c=>{D.chars[c.id]=c})
  D.playbooks=pbRes.data||[]
  D.gods=godRes.data||[]
  D.pantheons=panRes.data||[]
  D.moves=movesRes.data||[]
  D.charMoves={}
  ;(cmRes.data||[]).forEach(r=>{
    if(!D.charMoves[r.character_id])D.charMoves[r.character_id]=new Set()
    D.charMoves[r.character_id].add(r.move_id)
  })
  D.patronage={}
  ;(patRes.data||[]).forEach(r=>{
    if(!D.patronage[r.character_id])D.patronage[r.character_id]=[]
    D.patronage[r.character_id].push(r)
  })
  sync('ok')
  populateCharSelects()
}

function populateCharSelects(){
  const chars=Object.values(D.chars).filter(c=>c.creation_complete)
  const opts=chars.map(c=>`<option value="${c.id}">${esc(c.display_name||c.id)}</option>`).join('')
  ;['jury-char-sel','harm-char-sel','eq-char-sel','award-char'].forEach(id=>{
    const el=document.getElementById(id); if(!el) return
    const first=el.options[0].outerHTML
    el.innerHTML=first+opts
  })
}

function subscribeRealtime(){
  db.channel('dm-watch')
    .on('postgres_changes',{event:'UPDATE',schema:'public',table:'characters'},p=>{D.chars[p.new.id]=p.new;renderOverview();renderPullControls();renderMarkupControls();renderAdvControls()})
    .on('postgres_changes',{event:'*',schema:'public',table:'character_moves'},async()=>{
      const {data}=await db.from('character_moves').select('*')
      D.charMoves={}; data.forEach(r=>{if(!D.charMoves[r.character_id])D.charMoves[r.character_id]=new Set();D.charMoves[r.character_id].add(r.move_id)})
    })
    .on('postgres_changes',{event:'*',schema:'public',table:'character_patronage'},async()=>{
      const {data}=await db.from('character_patronage').select('*')
      D.patronage={}; data.forEach(r=>{if(!D.patronage[r.character_id])D.patronage[r.character_id]=[];D.patronage[r.character_id].push(r)})
      renderPatronage()
    })
    .on('postgres_changes',{event:'*',schema:'public',table:'moves'},async()=>{
      const {data}=await db.from('moves').select('*').order('order_index')
      D.moves=data||[]; if(document.getElementById('tab-moves').classList.contains('on'))renderMovesTree()
    })
    .subscribe()
  db.channel('jury-bc')
    .on('broadcast',{event:'vote'},({payload})=>{
      if(!_juryState.votes[_juryState.current_index])_juryState.votes[_juryState.current_index]={}
      _juryState.votes[_juryState.current_index][payload.character]=payload.vote
      broadcastJury(); renderJury()
    })
    .subscribe()
}

function renderAll(){renderOverview();renderJury();renderNpcs();renderPullControls();renderMarkupControls();renderAdvControls();renderPatronage()}

// ── OVERVIEW ──────────────────────────────────────────────────
function renderOverview(){
  const grid=document.getElementById('char-grid'); if(!grid) return
  const CHARS=['lewis','murphy','kara','finn']
  grid.innerHTML=CHARS.map(id=>{
    const c=D.chars[id]||{}; const pb=D.playbooks.find(p=>p.id===c.playbook_id)||{}
    const god=D.gods.find(g=>g.id===c.god_id)||{}
    const conds=(c.conditions||[])
    const harm=conds.reduce((s,x)=>s+(x.harm||0),0)
    const lim=(c.harm_limit||10)+(pb.harm_limit_bonus||0)
    const harmPct=Math.min(100,Math.round(harm/lim*100))
    const harmColor=harmPct>66?'var(--harm)':harmPct>33?'var(--warn)':'var(--ok)'
    return `<div class="char-card">
      <div class="char-card-hdr">
        <div class="char-ava">${esc(pb.emoji||'⚡')}</div>
        <div>
          <div class="char-name">${id.charAt(0).toUpperCase()+id.slice(1)}</div>
          <div class="char-sub">${esc(pb.name||'—')} · ${esc(god.name||'—')}</div>
        </div>
        <div style="margin-left:auto;text-align:right">
          <div class="harm-display"><span class="h">${harm}</span><span class="lim"> / ${lim}</span></div>
          <div style="font-family:Cinzel,serif;font-size:7px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:${harmColor}">HARM</div>
        </div>
      </div>
      <div class="char-body">
        <div class="stat-row">
          <span class="stat-lbl">Momentum</span>
          ${['wisdom','grit','bond'].map(tr=>`<span style="font-family:Cinzel,serif;font-size:8px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted)">${tr.charAt(0).toUpperCase()}</span>${pipsHtml(c[tr]||0,4,'')}`).join('')}
        </div>
        <div class="stat-row">
          <span class="stat-lbl">Pull</span>
          ${pullHtml(c.pull||0)}
          <span class="stat-lbl" style="margin-left:8px">Adv</span>
          <span style="font-family:Cinzel,serif;font-size:8px;color:#60a5fa">${c.mortal_track||0}/4</span>
          <span style="color:var(--muted)">M</span>
          <span style="font-family:Cinzel,serif;font-size:8px;color:var(--acc-l)">${c.divine_track||0}/4</span>
          <span style="color:var(--muted)">D</span>
        </div>
        ${conds.length?`<div class="cond-list">${conds.map(c=>`<div class="cond-pill${c.unstable?' unstable':''}">${esc(c.name)}<span class="h">${c.harm}</span>${c.unstable?'<span class="tag warn">⚠</span>':''}</div>`).join('')}</div>`:''}
        ${c.markup_mode?'<div class="tag warn" style="text-align:center">✏ Markup Mode On</div>':''}
      </div>
      <div class="card-actions">
        <button class="btn btn-acc btn-sm" onclick="grantAdvTrack('${id}','divine')">+Divine Track</button>
        <button class="btn btn-ghost" onclick="toggleMarkup('${id}')">Markup ${c.markup_mode?'Off':'On'}</button>
        <button class="btn btn-harm" onclick="quickHarmModal('${id}')">Apply Harm</button>
      </div>
    </div>`
  }).join('')
}

function pipsHtml(v,max,cl){
  let h='<div class="pips">'
  for(let i=0;i<max;i++) h+=`<div class="pip${cl?` ${cl}`:''} ${i<v?'on':''}"></div>`
  return h+'</div>'
}
function pullHtml(p){
  let h='<div class="pull-track">'
  for(let v=-3;v<=3;v++) h+=`<div class="pull-step${v===p?' active':''}">${v>0?'+'+v:v===0?'0':''+v}</div>`
  return h+'</div>'
}

// ── JURY ──────────────────────────────────────────────────────
function renderJury(){
  const si=document.getElementById('jury-session-info'), list=document.getElementById('jury-items-list'), res=document.getElementById('jury-results')
  if(!si) return
  const btn_s=document.getElementById('jury-start-btn'), btn_e=document.getElementById('jury-end-btn')
  if (_juryState.active){
    si.innerHTML=`<div class="tag info" style="margin-bottom:8px">Session Active</div>`
    btn_s.style.display='none'; btn_e.style.display='inline-block'
    const item=_juryState.items[_juryState.current_index]
    list.innerHTML=item?`<div style="font-family:Cinzel,serif;font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:6px">Current (${_juryState.current_index+1}/${_juryState.items.length}): ${esc(item.type)} — ${esc(item.character)}</div>
      <div class="jury-item active"><span class="jury-item-txt">${esc(item.text)}</span><span class="jury-item-type">Voting</span></div>
      ${buildVoteBar(_juryState.current_index)}
      <div style="display:flex;gap:6px;margin-top:8px">
        ${_juryState.current_index>0?`<button class="btn btn-ghost" onclick="juryPrev()">← Prev</button>`:''}
        ${_juryState.current_index<_juryState.items.length-1?`<button class="btn btn-acc" onclick="juryNext()">Next →</button>`:''}
        <button class="btn btn-ok" onclick="juryAward()">Award Mortal Track</button>
      </div>`:
      '<div class="empty">Add items below to begin</div>'
    const summary=[]
    _juryState.items.forEach((it,i)=>{
      const votes=_juryState.votes[i]||{}; const yes=Object.values(votes).filter(v=>v).length; const total=Object.keys(votes).length
      if(total) summary.push(`<div style="font-size:12px;color:var(--muted);padding:4px 0;border-bottom:1px solid var(--bor)">${esc(it.character)} — ${esc(it.type)}: <span style="color:var(--text)">${esc(it.text)}</span> → <span style="color:${yes>=2?'var(--ok)':'var(--dim)'}">${yes}/${total} Yes</span></div>`)
    })
    if(summary.length) res.innerHTML='<div class="stitle" style="margin-top:8px">Results <div class="stitle-bar"></div></div>'+summary.join('')
  } else {
    si.innerHTML=''; btn_s.style.display='inline-block'; btn_e.style.display='none'
    list.innerHTML=_juryState.items.length?_juryState.items.map((it,i)=>`<div class="jury-item"><span class="jury-item-txt">${esc(it.text)} <span style="font-family:Cinzel,serif;font-size:8px;color:var(--muted)">${esc(it.character)}</span></span><span class="jury-item-type">${esc(it.type)}</span><button class="btn btn-ghost" style="padding:2px 6px;font-size:7px" onclick="juryRemoveItem(${i})">×</button></div>`).join(''):'<div class="empty">No items added yet</div>'
    res.innerHTML=''
  }
}

function buildVoteBar(idx){
  const votes=_juryState.votes[idx]||{}; const chars=['lewis','murphy','kara','finn']
  return `<div class="vote-bar">${chars.map(c=>{
    const v=votes[c]; const n=c.charAt(0).toUpperCase()+c.slice(1)
    return `<div class="vote-seg ${v===undefined?'pend':v?'yes':'no'}">${n}: ${v===undefined?'?':v?'Yes':'No'}</div>`
  }).join('')}</div>`
}

function juryStart(){if(!_juryState.items.length){toast('Add items first');return};_juryState.active=true;_juryState.current_index=0;_juryState.votes={};broadcastJury();renderJury()}
function juryEnd(){_juryState.active=false;broadcastJury();renderJury();toast('Jury session ended')}
function juryNext(){if(_juryState.current_index<_juryState.items.length-1){_juryState.current_index++;broadcastJury();renderJury()}}
function juryPrev(){if(_juryState.current_index>0){_juryState.current_index--;broadcastJury();renderJury()}}
function juryAddItem(){const ch=document.getElementById('jury-char-sel').value,type=document.getElementById('jury-type-sel').value,text=document.getElementById('jury-text-in').value.trim();if(!ch||!text)return;_juryState.items.push({character:ch,type,text});document.getElementById('jury-text-in').value='';broadcastJury();renderJury()}
function juryRemoveItem(i){_juryState.items.splice(i,1);broadcastJury();renderJury()}
async function juryAward(){const it=_juryState.items[_juryState.current_index];if(!it)return;const c=D.chars[it.character];if(!c)return;await db.from('characters').update({mortal_track:Math.min(4,(c.mortal_track||0)+1),updated_at:new Date().toISOString()}).eq('id',it.character);toast(it.character+' +1 Mortal Track');addLog(`Jury: ${it.character} awarded +1 Mortal Track for "${it.text}"`)}
function broadcastJury(){db.channel('jury-bc').send({type:'broadcast',event:'jury-state',payload:{..._juryState}})}

// ── NPCS ──────────────────────────────────────────────────────
function renderNpcs(){

  list.innerHTML=_npcs.length?_npcs.map((n,i)=>`<div class="npc-item">

    ${n.notes?`<div class="npc-notes">${esc(n.notes)}</div>`:''}
  </div>`).join(''):'<div class="empty">No NPCs this session</div>'

function addNpc(){const name=document.getElementById('npc-name-in').value.trim();if(!name)return;_npcs.push({name,harm:document.getElementById('npc-harm-in').value.trim(),notes:document.getElementById('npc-notes-in').value.trim()});document.getElementById('npc-name-in').value='';document.getElementById('npc-harm-in').value='';document.getElementById('npc-notes-in').value='';saveLocal();renderNpcs()}

function renderPullControls(){

      <div style="display:flex;gap:3px">${[-3,-2,-1,0,1,2,3].map(v=>`<div class="pull-step${v===p?' active':''}" style="cursor:pointer" onclick="setPull('${id}',${v})">${v>0?'+'+v:v===0?'0':''+v}</div>`).join('')}</div>
      <span style="font-family:Cinzel,serif;font-size:12px;font-weight:700;color:var(--acc-l);margin-left:auto">${p>0?'+'+p:p===0?'0':''+p}</span>
    </div>`

async function setPull(id,v){await db.from('characters').update({pull:v,updated_at:new Date().toISOString()}).eq('id',id);D.chars[id].pull=v;renderPullControls();renderOverview()}

async function applyHarm(){
  const id=document.getElementById('harm-char-sel').value,name=document.getElementById('harm-name-in').value.trim()
  if(!id||!name){toast('Select target and name');return}
  const harm=parseInt(document.getElementById('harm-val-in').value)||1
  const unstable=document.getElementById('harm-unstable').checked

  D.chars[id].conditions=conds; document.getElementById('harm-name-in').value=''; document.getElementById('harm-val-in').value='1'; document.getElementById('harm-unstable').checked=false

// ── MOVES EDITOR ──────────────────────────────────────────────
let _selectedNode=null, _editingMoveId=null

function renderMovesTree(){
  const panel=document.getElementById('tree-panel'); if(!panel) return
  const coreCount=D.moves.filter(m=>!m.playbook_id).length
  let h=`<div class="tree-node${_selectedNode==='core'?' on':''}" onclick="selectNode('core')"><span class="tree-caret">▶</span>Core Moves<span class="tree-count">${coreCount}</span></div>`

  // Hero Playbooks
  const heroes=D.playbooks.filter(p=>p.type==='hero')
  h+=`<div class="tree-node section" style="display:flex;align-items:center;justify-content:space-between;padding-right:8px">Hero Playbooks<button onclick="event.stopPropagation();selectNode('new-hero-pb')" style="background:none;border:1px solid var(--acc);border-radius:3px;color:var(--acc-l);font-size:9px;padding:1px 6px;cursor:pointer;font-family:Cinzel,serif;font-weight:700">+</button></div>`
  heroes.forEach(pb=>{
    const cnt=D.moves.filter(m=>m.playbook_id===pb.id).length
    const key='pb:'+pb.id
    h+=`<div class="tree-node child${_selectedNode===key?' on':''}" onclick="selectNode('${key}')"><span style="margin-right:3px">${esc(pb.emoji||'')}</span>${esc(pb.name)}<span class="tree-count">${cnt}</span></div>`
  })

  // Divine (by pantheon > god > playbook)
  D.pantheons.forEach(pan=>{
    h+=`<div class="tree-node section" style="display:flex;align-items:center;justify-content:space-between;padding-right:8px">Pantheons › ${esc(pan.name)}<button onclick="event.stopPropagation();selectNode('new-god:${pan.id}')" style="background:none;border:1px solid var(--acc);border-radius:3px;color:var(--acc-l);font-size:9px;padding:1px 6px;cursor:pointer;font-family:Cinzel,serif;font-weight:700">+</button></div>`
    const gods=D.gods.filter(g=>g.pantheon_id===pan.id)
    gods.forEach(god=>{
      const divPb=D.playbooks.find(p=>p.god_id===god.id&&p.type==='divine')
      const godKey=divPb?'god:'+god.id+':'+divPb.id:'god:'+god.id+':'
      const cnt=divPb?D.moves.filter(m=>m.playbook_id===divPb.id).length:0
      h+=`<div class="tree-node child${_selectedNode===godKey?' on':''}" onclick="selectNode('${godKey}')"><span style="margin-right:3px">${esc(divPb?.emoji||'✦')}</span>${esc(god.name)}<span class="tree-count">${cnt}</span></div>`
      if(divPb){
        const branches=[...new Set(D.moves.filter(m=>m.playbook_id===divPb.id).map(m=>m.branch||'General'))]
        if(branches.length>1) branches.forEach(br=>{
          const bKey='branch:'+divPb.id+':'+br, bCnt=D.moves.filter(m=>m.playbook_id===divPb.id&&(m.branch||'General')===br).length
          h+=`<div class="tree-node grandchild${_selectedNode===bKey?' on':''}" onclick="selectNode('${bKey}')">↳ ${esc(br)}<span class="tree-count">${bCnt}</span></div>`
        })
      }
    })
  })
  h+=`<div class="tree-node section" style="display:flex;align-items:center;justify-content:space-between;padding-right:8px">New Pantheon<button onclick="event.stopPropagation();selectNode('new-pantheon')" style="background:none;border:1px solid var(--acc);border-radius:3px;color:var(--acc-l);font-size:9px;padding:1px 6px;cursor:pointer;font-family:Cinzel,serif;font-weight:700">+</button></div>`
  panel.innerHTML=h
}

function selectNode(key){
  _selectedNode=key; _editingMoveId=null; renderMovesTree(); renderEditorPanel()
}

function renderEditorPanel(){
  if(_selectedNode?.startsWith('god:')) renderGodPanel()
  else if(_selectedNode==='new-hero-pb') renderPlaybookForm(null,'hero')
  else if(_selectedNode?.startsWith('new-god:')) renderGodForm(null,_selectedNode.slice(9))
  else if(_selectedNode==='new-pantheon') renderPantheonForm()
  else renderMoveList()
}

function confirmDeletePlaybook(id, name){
  const chars=Object.values(D.chars).filter(c=>c.playbook_id===id||c.divine_playbook_id===id).map(c=>c.display_name||c.id)
  const moveCount=D.moves.filter(m=>m.playbook_id===id).length
  const body=`This will permanently delete the playbook and all ${moveCount} of its moves.${chars.length?` <b>${esc(chars.join(', '))}</b> currently ${chars.length===1?'has':'have'} this playbook assigned — it will be removed from their sheet.`:' No characters are currently using it.'}`
  showWarn('Delete "'+esc(name)+'"?',body,[
    {label:'Delete Everything',cls:'btn-harm',action:()=>deletePlaybook(id,name)},
    {label:'Cancel',cls:'btn-ghost',action:()=>closeWarn()}
  ])
}

async function deletePlaybook(id, name){
  closeWarn()
  // Moves cascade via FK, but clear character references first
  await db.from('characters').update({playbook_id:null}).eq('playbook_id',id)
  await db.from('characters').update({divine_playbook_id:null}).eq('divine_playbook_id',id)
  await db.from('character_patronage').delete().eq('playbook_id',id)
  const{error}=await db.from('playbooks').delete().eq('id',id)
  if(error){toast('Error: '+error.message);return}
  D.playbooks=D.playbooks.filter(p=>p.id!==id)
  D.moves=D.moves.filter(m=>m.playbook_id!==id)
  _selectedNode=null; renderMovesTree(); document.getElementById('editor-panel').innerHTML='<div class="empty">Playbook deleted</div>'
  addLog('Deleted playbook: '+name); toast('Deleted')
}

async function savePlaybook(id, forceType){
  const name=document.getElementById('pb-name')?.value?.trim(); if(!name){toast('Name required');return}
  const payload={
    name, type:forceType||document.getElementById('pb-type')?.value||'hero',
    emoji:document.getElementById('pb-emoji')?.value?.trim()||null,
    color:document.getElementById('pb-color')?.value?.trim()||null,
    color_light:document.getElementById('pb-color-l')?.value?.trim()||null,
    color_rgb:document.getElementById('pb-color-rgb')?.value?.trim()||null,
    harm_limit_bonus:parseInt(document.getElementById('pb-harm-bonus')?.value)||0,
    description:document.getElementById('pb-desc')?.value?.trim()||null,
  }
  if(id==='new'){
    const{data,error}=await db.from('playbooks').insert(payload).select().single()
    if(error){toast('Error: '+error.message);return}
    D.playbooks.push(data); _selectedNode='pb:'+data.id; addLog('Created playbook: '+name)
  } else {
    const{error}=await db.from('playbooks').update(payload).eq('id',id)
    if(error){toast('Error: '+error.message);return}
    const idx=D.playbooks.findIndex(p=>p.id===id); if(idx>=0) D.playbooks[idx]={...D.playbooks[idx],...payload}
    addLog('Updated playbook: '+name)
  }
  renderMovesTree(); renderMoveList(); toast('Playbook saved!')
}

function confirmDeleteGod(id, name){
  const divPb=D.playbooks.find(p=>p.god_id===id&&p.type==='divine')
  const moveCount=divPb?D.moves.filter(m=>m.playbook_id===divPb.id).length:0
  const chars=Object.values(D.chars).filter(c=>c.god_id===id).map(c=>c.display_name||c.id)
  const body=`Deletes the god${divPb?`, their divine playbook, and all ${moveCount} of its moves`:''}.${chars.length?` <b>${esc(chars.join(', '))}</b> currently ${chars.length===1?'has':'have'} this god assigned.`:' No characters are assigned to this god.'}`
  showWarn('Delete "'+esc(name)+'"?',body,[
    {label:'Delete',cls:'btn-harm',action:()=>deleteGod(id,name)},
    {label:'Cancel',cls:'btn-ghost',action:()=>closeWarn()}
  ])

async function deleteGod(id, name){
  closeWarn()
  const divPb=D.playbooks.find(p=>p.god_id===id&&p.type==='divine')
  if(divPb) await deletePlaybook(divPb.id, divPb.name).catch(()=>{})
  await db.from('characters').update({god_id:null}).eq('god_id',id)
  await db.from('character_patronage').delete().eq('god_id',id)
  const{error}=await db.from('gods').delete().eq('id',id)
  if(error){toast('Error: '+error.message);return}
  D.gods=D.gods.filter(g=>g.id!==id)
  _selectedNode=null; renderMovesTree(); document.getElementById('editor-panel').innerHTML='<div class="empty">God deleted</div>'
  addLog('Deleted god: '+name); toast('Deleted')
}

    const{data,error}=await db.from('gods').insert(payload).select().single()
    if(error){toast('Error: '+error.message);return}
    D.gods.push(data); _selectedNode='god:'+data.id+':'; addLog('Created god: '+name)
  } else {
    const{error}=await db.from('gods').update(payload).eq('id',id)
    if(error){toast('Error: '+error.message);return}
    const idx=D.gods.findIndex(g=>g.id===id); if(idx>=0) D.gods[idx]={...D.gods[idx],...payload}
    _selectedNode='god:'+id+':'+(D.playbooks.find(p=>p.god_id===id&&p.type==='divine')?.id||'')

function renderMoveList(){
  const panel=document.getElementById('editor-panel'); if(!panel) return
  let moves=[], pbId=null, title='', branchFilter=null
  if(_selectedNode==='core'){moves=D.moves.filter(m=>!m.playbook_id);title='Core Moves'}
  else if(_selectedNode?.startsWith('pb:')){pbId=_selectedNode.slice(3);moves=D.moves.filter(m=>m.playbook_id===pbId);const pb=D.playbooks.find(p=>p.id===pbId);title=pb?.name||'Playbook'}
  else if(_selectedNode?.startsWith('branch:')){const parts=_selectedNode.split(':');pbId=parts[1];branchFilter=parts[2];moves=D.moves.filter(m=>m.playbook_id===pbId&&(m.branch||'General')===branchFilter);title=branchFilter}
  if(!_selectedNode){panel.innerHTML='<div class="empty">Select a playbook from the tree</div>';return}
  const editPbBtn=pbId&&!branchFilter?`<button class="btn btn-ghost" onclick="renderPlaybookForm('${pbId}','')">Edit Playbook</button>`:'';
  let h=`<div style="display:flex;align-items:center;gap:8px;justify-content:space-between;margin-bottom:12px"><div style="font-family:Cinzel Decorative,serif;font-size:16px;color:var(--acc-l)">${esc(title)}</div><div style="display:flex;gap:6px">${editPbBtn}<button class="btn btn-acc" onclick="startNewMove('${esc(pbId||'')}','${esc(branchFilter||'')}')">+ New Move</button></div></div>`
  if(moves.length){
    moves.forEach(m=>{
      h+=`<div class="move-list-item${_editingMoveId===m.id?' editing':''}" onclick="editMove('${m.id}')">
        <div style="flex:1"><div class="mli-name">${esc(m.name)}</div><div style="display:flex;gap:8px;margin-top:2px"><span class="mli-branch">${esc(m.branch||'')}</span><span class="mli-tier">${esc(m.tier||'')}</span>${m.roll_score?`<span class="tag ok">${esc(m.roll_score)}</span>`:''}</div></div>
        <button class="btn btn-harm" style="padding:3px 8px;font-size:7px" onclick="event.stopPropagation();confirmDeleteMove('${m.id}','${esc(m.name)}')">Del</button>
      </div>`
    })
  } else h+='<div class="empty">No moves yet</div>'
  h+=`<div id="edit-form-slot"></div>`
  panel.innerHTML=h
  if(_editingMoveId) renderEditForm(D.moves.find(m=>m.id===_editingMoveId))
}

function startNewMove(pbId,branch){

  renderMoveList()
}

    <div style="display:flex;gap:10px;align-items:center;margin-bottom:12px">
      <label style="display:flex;align-items:center;gap:5px;font-size:12px;cursor:pointer"><input type="checkbox" id="ef-anyorder" ${m.can_take_any_order?'checked':''} style="accent-color:var(--acc)"> Any order (prereqs not enforced)</label>
      <label style="display:flex;align-items:center;gap:5px;font-size:12px;cursor:pointer"><input type="checkbox" id="ef-active" ${m.is_active!==false?'checked':''} style="accent-color:var(--ok)"> Active (visible to players)</label>
    </div>
    <div style="display:flex;gap:8px">
      <button class="btn btn-acc" onclick="saveMove('${isNew?'new':m.id}')">Save Move</button>
      <button class="btn btn-ghost" onclick="_editingMoveId=null;renderMoveList()">Cancel</button>
    </div>
  </div>`
  slot.innerHTML=h
}

function outcomeRow(i,o){
  return `<div class="out-row" id="out-row-${i}">
    <span class="out-row-num">${i+1}</span>
    <div style="display:flex;flex-direction:column;gap:4px;flex:1">
      <div style="display:flex;gap:6px">
        <select class="fi" id="out-tier-${i}" style="width:100px"><option value="success"${o.tier==='success'?' selected':''}>success</option><option value="partial"${o.tier==='partial'?' selected':''}>partial</option><option value="fail"${o.tier==='fail'?' selected':''}>fail</option></select>
        <input class="fi" id="out-lbl-${i}" value="${esc(o.label||'')}" placeholder="Label (e.g. 10+)" style="flex:1">
      </div>
      <textarea class="fi" id="out-txt-${i}" style="min-height:44px">${esc(o.text||'')}</textarea>
    </div>
    <button class="out-remove" onclick="removeOutcomeRow(${i})">×</button>
  </div>`
}
let _outcomeCount=0
function addOutcomeRow(){
  const container=document.getElementById('ef-outs'); if(!container) return
  _outcomeCount=(container.children.length)
  const div=document.createElement('div'); div.innerHTML=outcomeRow(_outcomeCount,{tier:'fail',label:'',text:''}); container.appendChild(div.firstChild)
}
function removeOutcomeRow(i){const el=document.getElementById('out-row-'+i);if(el)el.remove()}

function collectOutcomes(){
  const container=document.getElementById('ef-outs'); if(!container) return []
  return Array.from(container.querySelectorAll('.out-row')).map((row,i)=>{
    const idx=row.id.replace('out-row-','')
    return {tier:document.getElementById('out-tier-'+idx)?.value||'fail',label:document.getElementById('out-lbl-'+idx)?.value||'',text:document.getElementById('out-txt-'+idx)?.value||''}
  }).filter(o=>o.text)
}

async function saveMove(id){
  const name=document.getElementById('ef-name')?.value?.trim(); if(!name){toast('Name required');return}
  const prereqs=Array.from(document.querySelectorAll('#ef-prereqs input:checked')).map(c=>c.value)
  const payload={
    name, type:document.getElementById('ef-type')?.value||'hero',
    branch:document.getElementById('ef-branch')?.value?.trim()||null,
    tier:document.getElementById('ef-tier')?.value?.trim()||null,
    order_index:parseInt(document.getElementById('ef-ord')?.value)||0,
    roll_score:document.getElementById('ef-roll')?.value||null,
    trigger_text:document.getElementById('ef-trigger')?.value?.trim()||null,
    body:document.getElementById('ef-body')?.value?.trim()||null,
    outcomes:collectOutcomes(),
    note:document.getElementById('ef-note')?.value?.trim()||null,
    prereq_move_ids:prereqs,
    can_take_any_order:document.getElementById('ef-anyorder')?.checked??true,
    is_active:document.getElementById('ef-active')?.checked??true,
    updated_at:new Date().toISOString()
  }
  if(_selectedNode?.startsWith('pb:')&&!payload.playbook_id) payload.playbook_id=_selectedNode.slice(3)
  if(id==='new'){const{data,error}=await db.from('moves').insert({...payload,playbook_id:_selectedNode?.startsWith('pb:')?_selectedNode.slice(3):null}).select().single();if(error){toast('Error: '+error.message);return};D.moves.push(data);addLog('Created move: '+name)}
  else{const{error}=await db.from('moves').update(payload).eq('id',id);if(error){toast('Error: '+error.message);return};const idx=D.moves.findIndex(m=>m.id===id);if(idx>=0)D.moves[idx]={...D.moves[idx],...payload};addLog('Updated move: '+name)}
  _editingMoveId=null; renderMovesTree(); renderMoveList(); toast('Saved!')
}

function confirmDeleteMove(id,name){
  // Check which characters have this move
  const holders=Object.entries(D.charMoves).filter(([,s])=>s.has(id)).map(([c])=>c)
  const body=holders.length?`<b>${esc(holders.join(', '))}</b> ${holders.length===1?'has':'have'} this move unlocked. Deleting it will remove it from their sheet.`:`No characters have this move unlocked. Safe to delete.`
  showWarn('Delete "'+esc(name)+'"?',body,[
    {label:'Delete',cls:'btn-harm',action:()=>deleteMove(id,name)},
    {label:'Cancel',cls:'btn-ghost',action:()=>closeWarn()}
  ])
}

async function deleteMove(id,name){
  closeWarn()
  const{error}=await db.from('moves').delete().eq('id',id)
  if(error){toast('Error: '+error.message);return}
  D.moves=D.moves.filter(m=>m.id!==id)
  Object.values(D.charMoves).forEach(s=>s.delete(id))
  _editingMoveId=null; renderMovesTree(); renderMoveList(); addLog('Deleted move: '+name); toast('Deleted')
}

// ── TOOLS: PATRONAGE ──────────────────────────────────────────
function renderPatronage(){
  const sec=document.getElementById('patronage-section'); if(!sec) return
  const divinePlaybooks=D.playbooks.filter(p=>p.type==='divine')
  sec.innerHTML=['lewis','murphy','kara','finn'].map(id=>{
    const c=D.chars[id]||{}; const birthGodId=c.god_id
    const granted=(D.patronage[id]||[]).map(p=>p.playbook_id)
    const available=divinePlaybooks.filter(pb=>{
      const isOwn=D.gods.find(g=>g.id===birthGodId)?.id&&D.playbooks.find(p=>p.god_id===birthGodId&&p.id===pb.id)
      return !isOwn&&!granted.includes(pb.id)
    })
    const currentPatrons=(D.patronage[id]||[]).map(p=>{const pb=divinePlaybooks.find(x=>x.id===p.playbook_id);return pb?esc(pb.emoji||'')+'&nbsp;'+esc(pb.name||''):''}).filter(Boolean)
    return `<div style="background:var(--surf2);border:1px solid var(--bor);border-radius:var(--r);padding:10px;margin-bottom:8px">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px"><span style="font-family:Cinzel,serif;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase">${id.charAt(0).toUpperCase()+id.slice(1)}</span>${currentPatrons.map(n=>`<span class="tag info">${n}</span>`).join('')}</div>
      ${available.length?`<div style="display:flex;gap:6px;flex-wrap:wrap">${available.map(pb=>`<button class="btn btn-acc" onclick="grantPatronage('${id}','${pb.id}')">${esc(pb.emoji||'')} ${esc(pb.name||'')}</button>`).join('')}</div>`:'<div style="font-size:12px;color:var(--muted);font-style:italic">All available playbooks granted</div>'}
      ${(D.patronage[id]||[]).length?`<div style="margin-top:6px">${(D.patronage[id]||[]).map(p=>{const pb=divinePlaybooks.find(x=>x.id===p.playbook_id);return pb?`<button class="btn btn-harm" style="margin-right:4px;font-size:7px" onclick="revokePatronage('${id}','${p.playbook_id}')">Revoke ${esc(pb.name||'')}</button>`:''}).join('')}</div>`:''}`
  }).join('')
}

async function grantPatronage(charId,pbId){
  const pb=D.playbooks.find(p=>p.id===pbId), god=D.gods.find(g=>g.id===pb?.god_id)
  const{error}=await db.from('character_patronage').insert({character_id:charId,god_id:god?.id,playbook_id:pbId})
  if(error){toast('Error: '+error.message);return}
  if(!D.patronage[charId])D.patronage[charId]=[]
  D.patronage[charId].push({character_id:charId,god_id:god?.id,playbook_id:pbId})
  renderPatronage(); addLog(`Granted ${pb?.name||pbId} patronage to ${charId}`); toast('Patronage granted')
}

async function revokePatronage(charId,pbId){
  const pb=D.playbooks.find(p=>p.id===pbId)
  showWarn('Revoke '+esc(pb?.name||pbId)+'?',`Remove ${pb?.name||pbId} from ${charId}'s sheet. Their unlocked moves from this playbook will remain but they can't unlock new ones.`,[
    {label:'Revoke',cls:'btn-harm',action:async()=>{closeWarn();await db.from('character_patronage').delete().eq('character_id',charId).eq('playbook_id',pbId);D.patronage[charId]=(D.patronage[charId]||[]).filter(p=>p.playbook_id!==pbId);renderPatronage();toast('Revoked')}},
    {label:'Cancel',cls:'btn-ghost',action:()=>closeWarn()}
  ])
}

async function sendEquipment(){
  const id=document.getElementById('eq-char-sel').value; if(!id){toast('Select target');return}
  const name=document.getElementById('eq-name-in').value.trim(); if(!name){toast('Name required');return}
  const c=D.chars[id]||{}; const inv=[...(c.inventory||[]),{name,harm:document.getElementById('eq-harm-in').value.trim(),tags:document.getElementById('eq-tags-in').value.trim(),notes:document.getElementById('eq-notes-in').value.trim()}]
  await db.from('characters').update({inventory:inv,updated_at:new Date().toISOString()}).eq('id',id)
  D.chars[id].inventory=inv; document.getElementById('eq-name-in').value=''; document.getElementById('eq-harm-in').value=''; document.getElementById('eq-tags-in').value=''; document.getElementById('eq-notes-in').value=''
  addLog(`Sent "${name}" to ${id}`); toast('Equipment sent')
}

async function grantAdvTrack(id,type){await awardTrack(id,type)}

// ── WARN MODAL ────────────────────────────────────────────────
function showWarn(ttl,body,btns){
  document.getElementById('warn-ttl').textContent=ttl
  document.getElementById('warn-body').innerHTML=body
  document.getElementById('warn-btns').innerHTML=btns.map((b,i)=>`<button class="btn ${b.cls}" onclick="_warnActions[${i}]()">${b.label}</button>`).join('')
  window._warnActions=btns.map(b=>b.action)
  document.getElementById('warn-modal-bg').classList.add('on')
}
function closeWarn(){document.getElementById('warn-modal-bg').classList.remove('on')}

// ── LOG ───────────────────────────────────────────────────────
function renderLog(){
  const el=document.getElementById('log-list'); if(!el) return
  el.innerHTML=_log.length?[..._log].reverse().map(e=>`<div class="log-item"><div class="log-time">${e.time}</div><div class="log-msg">${esc(e.msg)}</div></div>`).join(''):'<div class="empty">No activity yet</div>'
}
function addLog(msg){_log.push({time:new Date().toLocaleTimeString(),msg});if(_log.length>200)_log=_log.slice(-200);saveLocal();renderLog()}
function clearLog(){_log=[];saveLocal();renderLog()}

// ── UTILS ─────────────────────────────────────────────────────
function sync(s){const el=document.getElementById('sync');if(el)el.className='sync'+(s!=='ok'?' '+s:'')}
function esc(s){if(!s)return '';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function toast(msg){const t=document.getElementById('toast');if(!t)return;t.textContent=msg;t.classList.add('on');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('on'),3000)}
</script>
